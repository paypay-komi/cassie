<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#5865F2">
<link rel="icon" type="image/png" href="https://cdn.discordapp.com/avatars/1461183051949412384/28589706755d6dda2b6f2b6e1b79fb31.png?size=64">
<title>Thank You! — Cassie</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f13;
  --card: #1a1a22;
  --text: #fff;
  --muted: #8e9297;
  --accent: #5865F2;
  --accent-hover: #4752c4;
  --border: #2a2a36;
  --success: #3ba55d;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.wrap {
  max-width: 600px;
  margin: 0 auto;
  padding: 40px 20px;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}
header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 60px;
  width: 100%;
  max-width: 960px;
  padding: 0 20px;
  margin-left: auto;
  margin-right: auto;
  padding-top: 40px;
}
header img {
  width: 48px;
  height: 48px;
  border-radius: 12px;
}
header h1 {
  font-size: 22px;
  font-weight: 700;
  flex: 1;
}
header nav {
  display: flex;
  gap: 20px;
  font-size: 14px;
}
header nav a {
  color: var(--muted);
  text-decoration: none;
  transition: color 0.15s;
}
header nav a:hover { color: var(--text); }
.icon {
  width: 80px;
  height: 80px;
  background: #3ba55d1a;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 24px;
}
.icon svg { width: 40px; height: 40px; }
h2 {
  font-size: 32px;
  font-weight: 800;
  margin-bottom: 12px;
  letter-spacing: -1px;
}
p {
  font-size: 16px;
  color: var(--muted);
  max-width: 420px;
  margin-bottom: 32px;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 28px;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.15s;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
footer {
  border-top: 1px solid var(--border);
  padding: 24px 20px;
  text-align: center;
  font-size: 13px;
  color: var(--muted);
}
footer a { color: var(--muted); text-decoration: none; }
footer a:hover { color: var(--text); }
footer .links { display: flex; gap: 16px; justify-content: center; margin-top: 8px; }
@media (max-width: 600px) {
  header { flex-direction: column; text-align: center; gap: 8px; margin-bottom: 40px; }
  header nav { font-size: 13px; gap: 14px; }
  h2 { font-size: 24px; }
}
</style>
</head>
<body>
  <header>
    <img id="bot-avatar" src="https://cdn.discordapp.com/avatars/1461183051949412384/28589706755d6dda2b6f2b6e1b79fb31.png?size=64" alt="Cassie">
    <h1>Cassie</h1>
    <nav>
      <a href="/dashboard">Dashboard</a>
      <a href="/terms">Terms</a>
      <a href="/privacy">Privacy</a>
    </nav>
  </header>
  <div class="wrap">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#3ba55d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h2>Thank You!</h2>
    <p>Cassie has been invited to your server. Head back to the landing page to get started.</p>
    <a class="btn btn-primary" href="/">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Back to Landing Page
    </a>
  </div>
  <footer>
    <span>&copy; 2026 Cassie. Not affiliated with Discord.</span>
  </footer>
<script>
fetch('/api/bot/avatar')
  .then(r => r.json())
  .then(d => {
    if (!d.ok) return;
    document.querySelectorAll('link[rel="icon"]').forEach(l => l.href = d.url.replace('?size=512', '?size=64'));
    const img = document.getElementById('bot-avatar');
    if (img) img.src = d.url.replace('?size=512', '?size=64');
  });
</script>
</body>
</html>
