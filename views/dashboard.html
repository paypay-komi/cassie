<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta property="og:title" content="Nekomi Dashboard">
<meta property="og:description" content="Manage your Cassie bot settings — server configuration, command overrides, tags, and more.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://nekomi.tailef6033.ts.net/dashboard">
<meta property="og:image" content="https://cdn.discordapp.com/avatars/1461183051949412384/28589706755d6dda2b6f2b6e1b79fb31.png?size=512">
<meta property="og:image:width" content="512">
<meta property="og:image:height" content="512">
<meta name="theme-color" content="#5865F2">
<meta name="twitter:card" content="summary">
<link rel="icon" type="image/png" href="https://cdn.discordapp.com/avatars/1461183051949412384/28589706755d6dda2b6f2b6e1b79fb31.png?size=64">
<title>Nekomi Dashboard</title>
<!-- OG embed cache buster: bump ?v=N in the image URL to force Discord to refresh cached embed -->
<style>
body { margin: 0; font-family: Arial, sans-serif; background: #0f0f13; color: white; display: flex; flex-direction: column; height: 100vh; }
header { background: #15151c; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
header h1 { margin: 0; color: white; font-weight: bold; }
.user-info { color: #aaa; font-size: 0.9em; }
.guild-grid { flex: 1; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; overflow-y: auto; }
.guild-card { background: #1a1a22; border: 1px solid #22222c; border-radius: 8px; padding: 20px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; }
.guild-card:hover { background: #22222c; transform: translateY(-2px); }
.guild-icon { width: 64px; height: 64px; border-radius: 16px; background: #22222c; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 24px; color: #aaa; overflow: hidden; }
.guild-icon img { width: 100%; height: 100%; object-fit: cover; }
.guild-name { margin: 15px 0 5px; text-align: center; font-size: 14px; font-weight: bold; }
.guild-label { font-size: 0.9em; color: #aaa; }
.manage-label { color: #28a745; font-weight: bold; }
.invite-label { color: #007bff; font-weight: bold; }

.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; }
.modal-box { background: #1a1a22; border-radius: 12px; padding: 24px; width: 340px; text-align: center; position: relative; }
.modal-box h2 { margin: 0 0 10px; font-size: 18px; }
.modal-box p { margin: 0 0 20px; color: #aaa; font-size: 14px; }
.modal-box .invite-btn { padding: 10px 24px; background: #5865F2; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 15px; transition: 0.15s; }
.modal-box .invite-btn:hover { background: #4752C4; }
.modal-box .refresh-btn { margin-top: 12px; padding: 8px 16px; background: #444; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; display: none; }
.modal-box .refresh-btn:hover { background: #555; }
.modal-close { position: absolute; top: 10px; right: 14px; background: none; border: none; color: #888; font-size: 22px; cursor: pointer; }
.modal-close:hover { color: white; }

.guild-grid::-webkit-scrollbar { width: 8px; }
.guild-grid::-webkit-scrollbar-track { background: #22222c; }
.guild-grid::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
</style>
</head>
<body>
<header><h1>Dashboard</h1><div class="user-info" id="userInfo">Loading...</div></header>
<div class="guild-grid" id="guildGrid"></div>

<div class="modal-overlay" id="inviteModal">
  <div class="modal-box">
    <button class="modal-close" id="closeBtn">&times;</button>
    <h2 id="modalTitle">Invite Server</h2>
    <p id="modalText">The bot isn't in this server yet.</p>
    <button class="invite-btn" id="inviteBtn">Invite Bot</button>
    <button class="refresh-btn" id="refreshBtn">Refresh</button>
  </div>
</div>

<script>
let clientId = null;
let perms = null;

document.addEventListener('DOMContentLoaded', async () => {
  const guildGrid = document.getElementById('guildGrid');
  const modal = document.getElementById('inviteModal');
  const modalTitle = document.getElementById('modalTitle');
  const modalText = document.getElementById('modalText');
  const inviteBtn = document.getElementById('inviteBtn');
  const refreshBtn = document.getElementById('refreshBtn');
  const closeBtn = document.getElementById('closeBtn');

  // Load user
  const userRes = await fetch('/api/data/user', { credentials: 'include' });
  const userData = await userRes.json();
  if (userData.ok) document.getElementById('userInfo').textContent = userData.username;

  // Load guilds
  const res = await fetch('/api/data/guilds', { credentials: 'include' });
  const data = await res.json();
  if (!data.ok) {
    guildGrid.innerHTML = '<p style="color:red;text-align:center;padding:40px">Unauthorized</p>';
    return;
  }

  clientId = data.clientId;
  perms = data.perms;

  guildGrid.innerHTML = '';

  if (data.guilds.length === 0) {
    guildGrid.innerHTML = `
      <div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:#aaa">
        <div style="font-size:48px;margin-bottom:16px">📋</div>
        <h2 style="color:var(--text,#fff);margin:0 0 8px">No Servers Found</h2>
        <p style="margin:0 0 16px;font-size:14px">
          You don't have permission to manage any servers yet.<br>
          Create a server or ask the owner of an existing server to give you
          <strong>Manage Server</strong> permissions.
        </p>
        <a href="https://discord.com/create"
           target="_blank"
           style="display:inline-block;padding:10px 24px;background:#5865F2;color:#fff;
                  border-radius:6px;text-decoration:none;font-size:15px">
          Create a Server
        </a>
      </div>`;
  }

  data.guilds.forEach(g => {
    const card = document.createElement('div');
    card.className = 'guild-card';
    card.innerHTML = `<div class="guild-icon">${g.icon ? `<img src="${g.icon}">` : g.fallback}</div>
      <div class="guild-name">${g.name}</div>
      <div class="guild-label ${g.botIn ? 'manage-label' : 'invite-label'}">${g.botIn ? 'Manage' : 'Invite'}</div>`;
    card.addEventListener('click', () => {
      if (g.botIn) window.location.href = `/guild/${g.id}`;
      else showInviteModal(g);
    });
    guildGrid.appendChild(card);
  });
});

function showInviteModal(guild) {
  document.getElementById('modalTitle').textContent = `Invite to ${guild.name}`;
  document.getElementById('modalText').textContent = 'The bot isn\'t in this server yet. Click below to invite it.';
  document.getElementById('inviteBtn').onclick = () => {
    window.open(`https://discord.com/oauth2/authorize?client_id=${clientId}&permissions=${perms}&scope=bot&guild_id=${guild.id}`, '_blank', 'noopener');
    document.getElementById('inviteModal').style.display = 'none';
    document.getElementById('refreshBtn').style.display = '';
  };
  document.getElementById('refreshBtn').onclick = () => window.location.reload();
  document.getElementById('closeBtn').onclick = () => document.getElementById('inviteModal').style.display = 'none';
  document.getElementById('inviteModal').onclick = (e) => { if (e.target === document.getElementById('inviteModal')) document.getElementById('inviteModal').style.display = 'none'; };
  document.getElementById('inviteModal').style.display = 'flex';
}
</script>
<div style="padding:12px 20px;text-align:center;border-top:1px solid #2a2a36;flex-shrink:0;font-size:12px;color:#666">
  <a href="/privacy" style="color:#888;text-decoration:none">Privacy Policy</a>
  <span style="margin:0 8px;color:#444">&middot;</span>
  <a href="/terms" style="color:#888;text-decoration:none">Terms of Service</a>
</div>
</body>
</html>
