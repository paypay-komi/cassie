<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="Cassie Dashboard">
<meta property="og:description" content="Manage your Cassie bot settings — server configuration, command overrides, tags, and more.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://nekomi.tailef6033.ts.net/dashboard">
<meta property="og:image" content="https://cdn.discordapp.com/avatars/1461183051949412384/28589706755d6dda2b6f2b6e1b79fb31.png?size=512">
<meta property="og:image:width" content="512">
<meta property="og:image:height" content="512">
<meta name="theme-color" content="#5865F2">
<meta name="twitter:card" content="summary">
<link rel="icon" type="image/png" href="https://cdn.discordapp.com/avatars/1461183051949412384/28589706755d6dda2b6f2b6e1b79fb31.png?size=64">
<title>Cassie Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f0f13;
  --sidebar: #15151c;
  --card: #1a1a22;
  --hover: #22222c;
  --text: #fff;
  --secondary: #b5bac1;
  --muted: #8e9297;
  --accent: #5865F2;
  --accent-hover: #4752c4;
  --border: #2a2a36;
  --green: #28a745;
  --blue: #007bff;
  --red: #ed4245;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100vh;
}
header {
  background: var(--sidebar);
  padding: 15px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}
header h1 { font-size: 20px; color: var(--accent); }
.user-info { color: var(--secondary); font-size: 14px; }
.header-actions { display: flex; align-items: center; gap: 14px; }
.search-input {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px 8px 32px;
  border-radius: 6px;
  width: 220px;
  font-size: 14px;
  transition: border-color 0.15s;
}
.search-input::placeholder { color: var(--muted); }
.search-input:focus { outline: none; border-color: var(--accent); }
.search-wrap { position: relative; }
.search-wrap .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; }
.guild-grid {
  flex: 1;
  padding: 20px 24px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
  overflow-y: auto;
}
.guild-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 24px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}
.guild-card:hover { background: var(--hover); border-color: var(--accent); transform: translateY(-2px); }
.guild-card.hidden { display: none; }
.guild-icon {
  width: 72px; height: 72px; border-radius: 18px;
  background: var(--hover);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 28px; color: var(--muted); overflow: hidden;
  margin-bottom: 14px;
}
.guild-icon img { width: 100%; height: 100%; object-fit: cover; }
.guild-name { text-align: center; font-size: 14px; font-weight: 600; margin-bottom: 6px; }
.guild-label { font-size: 12px; }
.manage-label { color: var(--green); font-weight: 600; }
.invite-label { color: var(--blue); font-weight: 600; }
.guild-stats {
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
}

.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; }
.modal-box { background: var(--card); border-radius: 12px; padding: 28px; width: 360px; max-width: 90vw; text-align: center; position: relative; }
.modal-box h2 { margin: 0 0 10px; font-size: 18px; }
.modal-box p { margin: 0 0 20px; color: var(--secondary); font-size: 14px; line-height: 1.5; }
.modal-box .invite-btn { padding: 10px 24px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: 600; transition: 0.15s; }
.modal-box .invite-btn:hover { background: var(--accent-hover); }
.modal-box .refresh-btn { margin-top: 12px; padding: 8px 16px; background: #444; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; display: none; }
.modal-box .refresh-btn:hover { background: #555; }
.modal-close { position: absolute; top: 10px; right: 14px; background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; }
.modal-close:hover { color: var(--text); }

.guild-grid::-webkit-scrollbar { width: 8px; }
.guild-grid::-webkit-scrollbar-track { background: transparent; }
.guild-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

@media (max-width: 700px) {
  header { flex-direction: column; gap: 10px; text-align: center; padding: 12px 16px; }
  .header-actions { width: 100%; }
  .search-input { width: 100%; }
  .search-wrap { flex: 1; }
  .guild-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); padding: 16px; gap: 12px; }
  .guild-icon { width: 56px; height: 56px; font-size: 22px; }
}
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:12px">
    <h1>Cassie</h1>
    <a href="/" style="color:var(--muted);font-size:13px;text-decoration:none">Home</a>
    <a href="/privacy" style="color:var(--muted);font-size:13px;text-decoration:none">Privacy</a>
    <a href="/terms" style="color:var(--muted);font-size:13px;text-decoration:none">Terms</a>
  </div>
  <div class="header-actions">
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input class="search-input" id="guildSearch" placeholder="Search servers..." oninput="filterGuilds()">
    </div>
    <div class="user-info" id="userInfo">Loading...</div>
  </div>
</header>
<div class="guild-grid" id="guildGrid"></div>

<div class="modal-overlay" id="inviteModal">
  <div class="modal-box">
    <button class="modal-close" id="closeBtn">&times;</button>
    <h2 id="modalTitle">Invite Server</h2>
    <p id="modalText">The bot isn't in this server yet.</p>
    <button class="invite-btn" id="inviteBtn">Invite Bot</button>
    <button class="refresh-btn" id="refreshBtn">Refresh</button>
  </div>
</div>

<script>
let clientId = null;
let perms = null;
let guildList = [];

document.addEventListener('DOMContentLoaded', async () => {
  const guildGrid = document.getElementById('guildGrid');
  const modal = document.getElementById('inviteModal');
  const modalTitle = document.getElementById('modalTitle');
  const modalText = document.getElementById('modalText');
  const inviteBtn = document.getElementById('inviteBtn');
  const refreshBtn = document.getElementById('refreshBtn');
  const closeBtn = document.getElementById('closeBtn');

  // Load user
  const userRes = await fetch('/api/data/user', { credentials: 'include' });
  const userData = await userRes.json();
  if (userData.ok) document.getElementById('userInfo').textContent = userData.username;

  // Load guilds
  const res = await fetch('/api/data/guilds', { credentials: 'include' });
  const data = await res.json();
  if (!data.ok) {
    guildGrid.innerHTML = '<p style="color:var(--red);text-align:center;padding:60px 20px">Unauthorized. <a href="/login" style="color:var(--accent)">Login again</a>.</p>';
    return;
  }

  clientId = data.clientId;
  perms = data.perms;

  // Sort: manageable first, then alphabetical
  data.guilds.sort((a, b) => {
    if (a.botIn !== b.botIn) return a.botIn ? -1 : 1;
    return a.name.localeCompare(b.name);
  });
  guildList = data.guilds;

  if (data.guilds.length === 0) {
    guildGrid.innerHTML = `
      <div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)">
        <div style="font-size:48px;margin-bottom:16px">📋</div>
        <h2 style="color:var(--text);margin:0 0 8px">No Servers Found</h2>
        <p style="margin:0 0 16px;font-size:14px;max-width:400px;margin-left:auto;margin-right:auto">
          You don't have <strong>Manage Server</strong> permissions on any servers that Cassie is in.
          Create your own or ask an owner to grant you permissions.
        </p>
        <a href="https://discord.com/create" target="_blank"
           style="display:inline-block;padding:10px 24px;background:var(--accent);color:#fff;
                  border-radius:6px;text-decoration:none;font-size:15px;font-weight:600">
          Create a Server
        </a>
      </div>`;
    return;
  }

  renderGuilds(data.guilds);
});

function renderGuilds(guilds) {
  const guildGrid = document.getElementById('guildGrid');
  guildGrid.innerHTML = '';
  guilds.forEach(g => {
    const card = document.createElement('div');
    card.className = 'guild-card';
    card.dataset.id = g.id;
    card.innerHTML = `
      <div class="guild-icon">${g.icon ? `<img src="${g.icon}" alt="">` : g.fallback}</div>
      <div class="guild-name">${escape(g.name)}</div>
      <div class="guild-label ${g.botIn ? 'manage-label' : 'invite-label'}">${g.botIn ? 'Manage' : 'Invite'}</div>
    `;
    card.addEventListener('click', () => {
      if (g.botIn) window.location.href = `/guild/${g.id}`;
      else showInviteModal(g);
    });
    guildGrid.appendChild(card);
  });
}

function filterGuilds() {
  const q = document.getElementById('guildSearch').value.toLowerCase().trim();
  document.querySelectorAll('.guild-card').forEach(card => {
    const name = card.querySelector('.guild-name').textContent.toLowerCase();
    card.classList.toggle('hidden', q !== '' && !name.includes(q));
  });
}

function showInviteModal(guild) {
  document.getElementById('modalTitle').textContent = `Invite to ${guild.name}`;
  document.getElementById('modalText').textContent = 'Cassie isn\'t in this server yet. Click below to invite her.';
  document.getElementById('inviteBtn').onclick = () => {
    window.open(`/invite?ref=dashboard&perms=${perms}&guild_id=${guild.id}`, '_blank', 'noopener');
    document.getElementById('inviteModal').style.display = 'none';
    document.getElementById('refreshBtn').style.display = '';
  };
  document.getElementById('refreshBtn').onclick = () => window.location.reload();
  closeModalBehavior('inviteModal');
  document.getElementById('inviteModal').style.display = 'flex';
}

function closeModalBehavior(modalId) {
  const overlay = document.getElementById(modalId);
  const closeBtn = overlay.querySelector('.modal-close');
  closeBtn.onclick = () => overlay.style.display = 'none';
  overlay.onclick = (e) => { if (e.target === overlay) overlay.style.display = 'none'; };
  const keydown = (e) => {
    if (e.key === 'Escape' && overlay.style.display === 'flex') {
      overlay.style.display = 'none';
      document.removeEventListener('keydown', keydown);
    }
  };
  document.addEventListener('keydown', keydown);
}

function escape(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
</script>
<div style="padding:12px 24px;text-align:center;border-top:1px solid var(--border);flex-shrink:0;font-size:12px;color:var(--muted)">
  <a href="/" style="color:var(--muted);text-decoration:none">Home</a>
  <span style="margin:0 8px;color:#444">&middot;</span>
  <a href="/privacy" style="color:var(--muted);text-decoration:none">Privacy</a>
  <span style="margin:0 8px;color:#444">&middot;</span>
  <a href="/terms" style="color:var(--muted);text-decoration:none">Terms</a>
  <span style="margin:0 8px;color:#444">&middot;</span>
  <a id="foot-support" href="#" target="_blank" style="color:var(--muted);text-decoration:none">Support</a>
</div>
<script>
fetch('/api/invite/support').then(r=>r.json()).then(d=>{if(d.ok)document.getElementById('foot-support').href=d.url;});
fetch('/api/bot/avatar').then(r=>r.json()).then(d=>{
  if(!d.ok)return;
  document.querySelectorAll('meta[property="og:image"]').forEach(m=>m.content=d.url);
  document.querySelectorAll('link[rel="icon"]').forEach(l=>l.href=d.url.replace('?size=512','?size=64'));
});
</script>
</body>
</html>
