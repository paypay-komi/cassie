<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cassie - Guild Management</title>
  <style>
    /* General Reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Theme Colors */
    :root {
      --bg: #0f0f13;
      --sidebar: #15151c;
      --card: #1a1a22;
      --hover: #22222c;
      --text: #fff;
      --secondary: #aaa;
      --accent: #5865F2;
    }

    body {
      font-family: "Arial", sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
    }

    /* Header */
    .header {
      background-color: var(--sidebar);
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2a2a36;
    }

    .header h1 {
      color: var(--accent);
      font-weight: bold;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background-color: var(--sidebar);
      padding: 1rem;
      height: 100vh;
      position: fixed;
      border-right: 1px solid #2a2a36;
    }

    .sidebar h2 {
      color: var(--secondary);
      margin-bottom: 1.5rem;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      padding: 0.5rem 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .sidebar-item:hover {
      background-color: var(--hover);
    }

    .sidebar-item.active {
      color: var(--text);
      background-color: #2a2a36;
      border-left: 4px solid var(--accent);
    }

    .sidebar-item svg {
      width: 16px;
      margin-right: 0.5rem;
    }

    /* Content Panel */
    .content {
      margin-left: 220px;
      padding: 1rem;
      flex: 1;
      overflow-y: auto;
    }

    /* Stat Cards */
    .stat-card {
      background-color: var(--card);
      border: 1px solid #2a2a36;
      padding: 1rem;
      margin: 0.5rem;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .stat-card svg {
      width: 24px;
      height: 24px;
      color: var(--secondary);
    }

    .stat-card .value {
      font-size: 1.2rem;
      font-weight: bold;
    }

    /* Command Toggle */
    .command-toggle {
      position: relative;
      width: 40px;
      height: 20px;
      border-radius: 10px;
      background-color: #333;
      cursor: pointer;
      transition: background 0.2s;
    }

    .command-toggle:before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      background-color: var(--text);
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: transform 0.2s;
    }

    .command-toggle.active {
      background-color: var(--accent);
    }

    .command-toggle.active:before {
      transform: translateX(22px);
    }

    /* Override Table */
    .override-table {
      background-color: var(--card);
      border: 1px solid #2a2a36;
      padding: 1rem;
      margin: 0.5rem 0;
    }

    .override-table tbody tr {
      border-bottom: 1px solid #2a2a38;
    }

    .override-table td {
      padding: 0.5rem 0;
    }

    .override-table button {
      background-color: transparent;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-weight: bold;
    }

    /* Tag List */
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .tag-card {
      background-color: var(--card);
      border: 1px solid #2a2a36;
      padding: 1rem;
      border-radius: 4px;
      flex: 1 1 calc(25% - 1rem);
      min-width: 200px;
    }

    .tag-card .tag-name {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 0.5rem;
    }

    .tag-card .tag-content {
      white-space: pre-wrap;
      background-color: #22222c;
      padding: 0.5rem;
      border-radius: 3px;
      margin-bottom: 0.5rem;
    }

    .tag-card button {
      background-color: transparent;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-weight: bold;
      margin-right: 0.5rem;
    }

    /* Form Inputs */
    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--secondary);
    }

    .form-group input, .form-group textarea {
      width: 100%;
      background-color: var(--card);
      color: var(--text);
      border: 1px solid #2a2a36;
      padding: 0.5rem;
      border-radius: 4px;
      resize: none;
    }

    /* Buttons */
    .btn {
      background-color: var(--accent);
      color: var(--text);
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover {
      background-color: #4752C4;
    }

    /* Custom Scrollbars */
    .content::-webkit-scrollbar {
      height: 8px;
    }

    .content::-webkit-scrollbar-thumb {
      background-color: #2a2a36;
      border-radius: 4px;
    }

    .content::-webkit-scrollbar-track {
      background-color: transparent;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        position: relative;
        margin-left: 0;
      }

      .content {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Cassie</h1>
    <div id="guild-header">
      <span id="guild-name">Loading...</span>
      <img id="guild-icon" src="" alt="Guild Icon" style="display:none">
    </div>
  </div>

  <div class="sidebar">
    <h2>Settings</h2>
    <div class="sidebar-item active" onclick="switchTab('overview')">📊 Overview</div>
    <div class="sidebar-item" onclick="switchTab('commands')">⚙️ Commands</div>
    <div class="sidebar-item" onclick="switchTab('overrides')">🔐 Overrides</div>
    <div class="sidebar-item" onclick="switchTab('tags')">🏷️ Tags</div>
  </div>

  <div class="content" id="content">
    <!-- Tabs will be loaded here -->
  </div>

  <script>
    const guildId = window.location.pathname.split('/')[2] || '0';
    let currentTab = 'overview';

    async function loadTab(tab) {
      const content = document.getElementById('content');
      content.innerHTML = '';
      
      if (tab === 'overview') {
        // Load overview content
        content.innerHTML = `<div class="stat-card"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8h2.582l-.707-.707a1 1 0 0 0-1.414 0l-3.293 3.293a1 1 0 0 0 0 1.414l.707.707H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1z"></path><path d="M10 16l-2.293-2.293a1 1 0 0 1 0-1.414l3.293-3.293a1 1 0 0 1 1.414 0l3.293 3.293a1 1 0 0 1 0 1.414l-2.293 2.293a1 1 0 0 1-1.414 0z"></path></svg><span class="value">Loading...</span></div>`;
        
        const stats = await fetch(`/api/data/guild-stats?guildId=${guildId}`, { credentials: 'include' }).then(r => r.json());
        if (stats.ok) {
          const statCards = ["guildName", "memberCount", "channelCount", "roleCount", "totalCommands"];
          const prefixCard = document.createElement('div');
          prefixCard.className = 'stat-card';
          prefixCard.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M12 17h7"></path><path d="M16 17l-7 7 7-7"></path></svg><span class="value">Prefix: <input type="text" class="prefix-input" value="${stats.stats.prefix}"></span><button class="btn" onclick="savePrefix()">Save</button>`;
          
          // Set guild header
          document.getElementById('guild-name').textContent = stats.stats.guildName;
          const iconEl = document.getElementById('guild-icon');
          if (stats.stats.guildIcon) {
            iconEl.src = stats.stats.guildIcon;
            iconEl.style.display = '';
          }

          const container = document.createElement('div');
          container.className = 'tag-list';
          
          for (const key of statCards) {
            const card = document.createElement('div');
            card.className = 'stat-card';
            card.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"></path><path d="M2 17l10 5 10-5M2 12l10 5 10-5"></path></svg><span class="value">${stats.stats[key]}</span>`;
            container.appendChild(card);
          }
          
          container.appendChild(prefixCard);
          content.appendChild(container);
        }
      } else if (tab === 'commands') {
        // Load commands content
        content.innerHTML = '<div class="command-group">Loading...</div>';
        
        const commands = await fetch(`/api/data/guild-commands?guildId=${guildId}`, { credentials: 'include' }).then(r => r.json());
        if (commands.ok) {
          const groupMap = commands.commands.reduce((map, cmd) => {
            const key = cmd.name.split(' ')[0];
            if (!map[key]) map[key] = [];
            map[key].push(cmd);
            return map;
          }, {});
          
          const searchInput = document.createElement('input');
          searchInput.type = 'text';
          searchInput.placeholder = 'Search commands...';
          searchInput.style.marginBottom = '1rem';
          
          const container = document.createElement('div');
          container.className = 'command-group';
          
          for (const [group, cmds] of Object.entries(groupMap)) {
            const groupHeader = document.createElement('h3');
            groupHeader.textContent = group;
            
            const groupContainer = document.createElement('div');
            
            cmds.forEach(cmd => {
              const row = document.createElement('div');
              row.style.display = 'flex';
              row.style.justifyContent = 'space-between';
              row.style.alignItems = 'center';
              row.style.marginBottom = '0.5rem';
              
              const name = document.createElement('span');
              name.textContent = cmd.name;
              
              const toggle = document.createElement('div');
              toggle.className = 'command-toggle';
              toggle.dataset.commandId = cmd.id;
              toggle.dataset.disabled = cmd.disabled;
              
              toggle.addEventListener('click', async () => {
                const disabled = toggle.dataset.disabled === 'true';
                await fetch(`/api/data/guild-command-toggle`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  credentials: 'include',
                  body: JSON.stringify({ guildId, commandId: toggle.dataset.commandId, disabled: !disabled })
                });
                toggle.dataset.disabled = !disabled;
                toggle.classList.toggle('active', !disabled);
              });
              
              row.appendChild(name);
              row.appendChild(toggle);
              
              groupContainer.appendChild(row);
            });
            
            container.appendChild(groupHeader);
            container.appendChild(groupContainer);
          }
          
          container.appendChild(searchInput);
          content.appendChild(container);
        }
      } else if (tab === 'overrides') {
        // Load overrides content
        content.innerHTML = '<div class="override-table">Loading...</div>';
        
        const overrides = await fetch(`/api/data/guild-overrides-list?guildId=${guildId}`, { credentials: 'include' }).then(r => r.json());
        if (overrides.ok) {
          const container = document.createElement('div');
          container.className = 'override-table';
          
          const addForm = document.createElement('div');
          addForm.style.display = 'flex';
          addForm.style.gap = '0.5rem';
          
          const typeSelect = document.createElement('select');
          typeSelect.innerHTML = `<option value="channel">Channel</option><option value="role">Role</option><option value="user">User</option>`;
          
          const targetInput = document.createElement('input');
          targetInput.placeholder = 'Target ID';
          
          const commandSelect = document.createElement('select');
          commandSelect.innerHTML = '<option value="">Select Command</option>';
          
          const allowToggle = document.createElement('input');
          allowToggle.type = 'checkbox';
          allowToggle.checked = true;
          
          const addButton = document.createElement('button');
          addButton.className = 'btn';
          addButton.textContent = 'Add';
          addButton.onclick = async () => {
            const type = typeSelect.value;
            const targetId = targetInput.value;
            const commandId = commandSelect.value;
            const allowed = allowToggle.checked;
            
            await fetch(`/api/data/guild-overrides`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              credentials: 'include',
              body: JSON.stringify({ guildId, type, targetId, commandId, allowed })
            });
            
            // Refresh overrides
            loadTab('overrides');
          };
          
          addForm.appendChild(typeSelect);
          addForm.appendChild(targetInput);
          addForm.appendChild(commandSelect);
          addForm.appendChild(allowToggle);
          addForm.appendChild(addButton);
          
          const table = document.createElement('table');
          table.style.width = '100%';
          table.style.borderCollapse = 'collapse';
          
          const thead = document.createElement('thead');
          const tr = document.createElement('tr');
          const th1 = document.createElement('th');
          th1.textContent = 'Type';
          const th2 = document.createElement('th');
          th2.textContent = 'Target ID';
          const th3 = document.createElement('th');
          th3.textContent = 'Command';
          const th4 = document.createElement('th');
          th4.textContent = 'Allowed';
          const th5 = document.createElement('th');
          th5.textContent = 'Actions';
          
          tr.appendChild(th1);
          tr.appendChild(th2);
          tr.appendChild(th3);
          tr.appendChild(th4);
          tr.appendChild(th5);
          thead.appendChild(tr);
          table.appendChild(thead);
          
          const tbody = document.createElement('tbody');
          
          overrides.channels.forEach(override => {
            const tr = document.createElement('tr');
            const td1 = document.createElement('td');
            td1.textContent = 'Channel';
            const td2 = document.createElement('td');
            td2.textContent = override.channelId;
            const td3 = document.createElement('td');
            td3.textContent = override.commandId;
            const td4 = document.createElement('td');
            td4.textContent = override.allowed ? 'Yes' : 'No';
            const td5 = document.createElement('td');
            
            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = 'Delete';
            deleteBtn.onclick = async () => {
              await fetch(`/api/data/guild-overrides-delete`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ guildId, type: 'channel', targetId: override.channelId, commandId: override.commandId })
              });
              
              // Refresh overrides
              loadTab('overrides');
            };
            
            td5.appendChild(deleteBtn);
            
            tr.appendChild(td1);
            tr.appendChild(td2);
            tr.appendChild(td3);
            tr.appendChild(td4);
            tr.appendChild(td5);
            tbody.appendChild(tr);
          });
          
          overrides.roles.forEach(override => {
            const tr = document.createElement('tr');
            const td1 = document.createElement('td');
            td1.textContent = 'Role';
            const td2 = document.createElement('td');
            td2.textContent = override.roleId;
            const td3 = document.createElement('td');
            td3.textContent = override.commandId;
            const td4 = document.createElement('td');
            td4.textContent = override.allowed ? 'Yes' : 'No';
            const td5 = document.createElement('td');
            
            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = 'Delete';
            deleteBtn.onclick = async () => {
              await fetch(`/api/data/guild-overrides-delete`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ guildId, type: 'role', targetId: override.roleId, commandId: override.commandId })
              });
              
              // Refresh overrides
              loadTab('overrides');
            };
            
            td5.appendChild(deleteBtn);
            
            tr.appendChild(td1);
            tr.appendChild(td2);
            tr.appendChild(td3);
            tr.appendChild(td4);
            tr.appendChild(td5);
            tbody.appendChild(tr);
          });
          
          overrides.users.forEach(override => {
            const tr = document.createElement('tr');
            const td1 = document.createElement('td');
            td1.textContent = 'User';
            const td2 = document.createElement('td');
            td2.textContent = override.userId;
            const td3 = document.createElement('td');
            td3.textContent = override.commandId;
            const td4 = document.createElement('td');
            td4.textContent = override.allowed ? 'Yes' : 'No';
            const td5 = document.createElement('td');
            
            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = 'Delete';
            deleteBtn.onclick = async () => {
              await fetch(`/api/data/guild-overrides-delete`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ guildId, type: 'user', targetId: override.userId, commandId: override.commandId })
              });
              
              // Refresh overrides
              loadTab('overrides');
            };
            
            td5.appendChild(deleteBtn);
            
            tr.appendChild(td1);
            tr.appendChild(td2);
            tr.appendChild(td3);
            tr.appendChild(td4);
            tr.appendChild(td5);
            tbody.appendChild(tr);
          });
          
          table.appendChild(tbody);
          
          container.appendChild(addForm);
          container.appendChild(table);
          content.appendChild(container);
        }
      } else if (tab === 'tags') {
        // Load tags content
        content.innerHTML = '<div class="tag-list">Loading...</div>';
        
        const tags = await fetch(`/api/data/guild-tags?guildId=${guildId}`, { credentials: 'include' }).then(r => r.json());
        if (tags.ok) {
          const container = document.createElement('div');
          container.className = 'tag-list';
          
          tags.tags.forEach(tag => {
            const card = document.createElement('div');
            card.className = 'tag-card';
            
            const name = document.createElement('div');
            name.className = 'tag-name';
            name.textContent = tag.name;
            
            const content = document.createElement('div');
            content.className = 'tag-content';
            content.textContent = tag.content;
            
            const actions = document.createElement('div');
            actions.style.display = 'flex';
            
            const editBtn = document.createElement('button');
            editBtn.textContent = 'Edit';
            editBtn.onclick = () => {
              // Implement edit logic
            };
            
            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = 'Delete';
            deleteBtn.onclick = async () => {
              if (confirm('Are you sure you want to delete this tag?')) {
              await fetch(`/api/data/guild-tags-delete`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ guildId, name: tag.name })
              });
                
                // Refresh tags
                loadTab('tags');
              }
            };
            
            actions.appendChild(editBtn);
            actions.appendChild(deleteBtn);
            
            card.appendChild(name);
            card.appendChild(content);
            card.appendChild(actions);
            
            container.appendChild(card);
          });
          
          const addForm = document.createElement('div');
          addForm.style.display = 'flex';
          addForm.style.gap = '0.5rem';
          
          const nameInput = document.createElement('input');
          nameInput.placeholder = 'Tag Name';
          
          const contentArea = document.createElement('textarea');
          contentArea.placeholder = 'Tag Content';
          
          const createBtn = document.createElement('button');
          createBtn.className = 'btn';
          createBtn.textContent = 'Create';
          createBtn.onclick = async () => {
            const name = nameInput.value;
            const content = contentArea.value;
            
            if (name && content) {
              await fetch(`/api/data/guild-tags-create`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ guildId, name, content })
              });
              
              // Refresh tags
              loadTab('tags');
            }
          };
          
          addForm.appendChild(nameInput);
          addForm.appendChild(contentArea);
          addForm.appendChild(createBtn);
          
          container.appendChild(addForm);
          content.appendChild(container);
        }
      }
    }

    async function switchTab(tab) {
      currentTab = tab;
      loadTab(tab);
    }

    // Initial load
    loadTab(currentTab);
  </script>
</body>
</html>
