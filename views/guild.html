<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cassie - Guild</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f13;
  --sidebar: #15151c;
  --card: #1a1a22;
  --hover: #22222c;
  --text: #fff;
  --secondary: #aaa;
  --accent: #5865F2;
  --green: #28a745;
  --red: #ed4245;
}
body {
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100vh;
}
/* ── Header ── */
.header {
  background: var(--sidebar);
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #2a2a36;
  flex-shrink: 0;
  z-index: 10;
}
.back-btn { color: var(--secondary); text-decoration: none; font-size: 13px; padding: 4px 10px; border-radius: 4px; transition: 0.15s; }
.back-btn:hover { color: var(--text); background: var(--hover); }
.header h1 { color: var(--accent); font-size: 18px; }
#guild-header {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  color: var(--secondary);
}
#guild-header img {
  width: 24px; height: 24px; border-radius: 6px;
}
/* ── Body (sidebar + content) ── */
.body-wrap {
  display: flex;
  flex: 1;
  overflow: hidden;
}
/* ── Sidebar ── */
.sidebar {
  width: 200px;
  background: var(--sidebar);
  padding: 12px 0;
  border-right: 1px solid #2a2a36;
  flex-shrink: 0;
  overflow-y: auto;
}
.sidebar-item {
  padding: 10px 16px;
  cursor: pointer;
  color: var(--secondary);
  font-size: 14px;
  transition: 0.15s;
  border-left: 3px solid transparent;
}
.sidebar-item:hover { background: var(--hover); color: var(--text); }
.sidebar-item.active {
  background: #2a2a36;
  color: var(--text);
  border-left-color: var(--accent);
}
/* ── Content ── */
.content {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}
/* ── Section titles ── */
.section-title {
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 16px;
  color: var(--text);
}
/* ── Stat grid ── */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--card);
  border: 1px solid #2a2a36;
  border-radius: 8px;
  padding: 16px;
}
.stat-card .stat-label {
  font-size: 11px;
  text-transform: uppercase;
  color: var(--secondary);
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}
.stat-card .stat-value {
  font-size: 22px;
  font-weight: bold;
}
/* ── Prefix row ── */
.prefix-row {
  background: var(--card);
  border: 1px solid #2a2a36;
  border-radius: 8px;
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.prefix-row label {
  font-size: 11px;
  text-transform: uppercase;
  color: var(--secondary);
  letter-spacing: 0.5px;
}
.prefix-row input {
  background: #22222c;
  border: 1px solid #333;
  color: var(--text);
  padding: 6px 10px;
  border-radius: 4px;
  font-size: 14px;
  width: 80px;
}
.prefix-row .status {
  font-size: 12px;
  color: var(--green);
  opacity: 0;
  transition: 0.2s;
}
.prefix-row .status.show { opacity: 1; }
/* ── Search input ── */
.search-input {
  background: var(--card);
  border: 1px solid #2a2a36;
  color: var(--text);
  padding: 8px 12px;
  border-radius: 4px;
  width: 100%;
  margin-bottom: 12px;
  font-size: 14px;
}
/* ── Command list ── */
.command-group { margin-bottom: 16px; }
.command-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 10px;
  border-radius: 4px;
}
.command-row .cmd-name { font-size: 14px; }
.parent-row {
  background: rgba(88,101,242,0.08);
  border: 1px solid rgba(88,101,242,0.2);
  border-radius: 6px;
  padding: 8px 10px;
  margin-bottom: 2px;
}
.parent-row .cmd-parent {
  font-weight: 700;
  color: var(--accent);
}
.child-row {
  padding-left: 10px;
  border-left: 2px solid #2a2a36;
}
.child-row .cmd-child {
  font-size: 13px;
  color: var(--secondary);
}
/* ── Toggle ── */
.toggle {
  width: 40px; height: 22px;
  border-radius: 11px;
  background: #444;
  cursor: pointer;
  position: relative;
  transition: 0.2s;
  flex-shrink: 0;
}
.toggle::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 16px; height: 16px;
  background: #fff;
  border-radius: 50%;
  transition: 0.2s;
}
.toggle.on { background: var(--accent); }
.toggle.on::after { transform: translateX(18px); }
/* ── Override table ── */
.override-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
.override-table th {
  text-align: left;
  padding: 8px;
  font-size: 11px;
  text-transform: uppercase;
  color: var(--secondary);
  border-bottom: 1px solid #2a2a36;
}
.override-table td {
  padding: 8px;
  font-size: 13px;
  border-bottom: 1px solid #2a2a36;
}
.override-table .del-btn {
  background: none; border: none; color: var(--red); cursor: pointer; font-size: 13px;
}
/* ── Add override form ── */
.add-override {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  align-items: center;
}
.add-override select, .add-override input {
  background: #22222c;
  border: 1px solid #333;
  color: var(--text);
  padding: 6px 10px;
  border-radius: 4px;
  font-size: 13px;
}
.add-override label { font-size: 12px; color: var(--secondary); display: flex; align-items: center; gap: 4px; }
/* ── Override target autocomplete ── */
.autocomplete-wrap { position: relative; width: 220px; }
.autocomplete-wrap input { width: 100%; }
.autocomplete-list {
  position: absolute; top: 100%; left: 0; right: 0;
  background: #1a1a22; border: 1px solid #333; border-top: none;
  max-height: 200px; overflow-y: auto; z-index: 100;
  display: none;
}
.autocomplete-list .ac-item {
  padding: 6px 10px; cursor: pointer; font-size: 13px;
  display: flex; align-items: center; gap: 8px;
}
.autocomplete-list .ac-item:hover { background: #2a2a36; }
.autocomplete-list .ac-item .ac-id {
  font-size: 10px; color: var(--secondary); font-family: monospace; margin-left: auto;
}
.autocomplete-list .ac-highlight { background: #2a2a36; }
/* ── Tags ── */
.tag-card {
  background: var(--card);
  border: 1px solid #2a2a36;
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 12px;
}
.tag-card .tag-name { font-weight: bold; font-size: 15px; margin-bottom: 6px; }
.tag-card .tag-meta { font-size: 11px; color: var(--secondary); margin-bottom: 6px; }
.tag-card .tag-content {
  background: #22222c;
  padding: 8px;
  border-radius: 4px;
  font-size: 13px;
  white-space: pre-wrap;
  word-break: break-word;
  margin-bottom: 8px;
}
.tag-card .tag-actions { display: flex; gap: 8px; }
.tag-card .tag-edit-area { margin-bottom: 8px; }
.tag-card .tag-edit-area textarea {
  width: 100%;
  background: #22222c;
  border: 1px solid #333;
  color: var(--text);
  padding: 8px;
  border-radius: 4px;
  font-size: 13px;
  resize: vertical;
  min-height: 60px;
}
.add-tag {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  align-items: center;
}
.add-tag input, .add-tag textarea {
  background: #22222c;
  border: 1px solid #333;
  color: var(--text);
  padding: 6px 10px;
  border-radius: 4px;
  font-size: 13px;
}
.add-tag textarea { min-height: 36px; resize: vertical; }
/* ── Buttons ── */
.btn {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 6px 14px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  transition: 0.15s;
}
.btn:hover { background: #4752C4; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-green { background: var(--green); }
.btn-green:hover { background: #218838; }
.btn-red { background: var(--red); }
.btn-red:hover { background: #c0392b; }
.btn-ghost { background: none; color: var(--accent); padding: 4px 8px; }
.btn-ghost:hover { background: var(--hover); }
/* ── Loading ── */
.loading {
  text-align: center;
  padding: 40px;
  color: var(--secondary);
  font-size: 14px;
}
/* ── Message ── */
.msg {
  padding: 12px;
  border-radius: 6px;
  font-size: 13px;
  margin-bottom: 12px;
}
.msg-error { background: #2a1515; border: 1px solid #5a2020; color: #ff6b6b; }
.msg-success { background: #152a15; border: 1px solid #205a20; color: #6bff6b; }
/* ── Info card ── */
.info-card {
  background: #15152a;
  border: 1px solid #2a2a4a;
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 13px;
  color: var(--secondary);
  margin-bottom: 16px;
  line-height: 1.5;
}
.info-card a {
  color: var(--accent);
  cursor: pointer;
  text-decoration: underline;
}
.info-card a:hover { color: #7983f5; }
.info-card strong { color: var(--text); }
/* ── Hierarchy box ── */
.hierarchy-box {
  background: #15152a;
  border: 1px solid #2a2a4a;
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 18px;
  font-size: 13px;
  line-height: 1.6;
}
.hierarchy-box .h-title {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--secondary);
  margin-bottom: 8px;
}
.hierarchy-box .h-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 3px 0;
  color: var(--secondary);
}
.hierarchy-box .h-row .h-arrow {
  color: #444;
  font-size: 11px;
  width: 14px;
  text-align: center;
}
.hierarchy-box .h-row.h-top { color: var(--text); }
.hierarchy-box .h-row.h-bot { color: #666; }
.hierarchy-box .h-tip {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid #2a2a4a;
  color: var(--secondary);
  font-size: 12px;
}
.hierarchy-box .h-tip a {
  color: var(--accent);
  cursor: pointer;
  text-decoration: underline;
}
/* ── State badge ── */
.state-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 2px 8px;
  border-radius: 10px;
  margin-left: 8px;
}
.state-badge.enabled { background: #152a15; color: #4caf50; border: 1px solid #2a5a2a; }
.state-badge.disabled { background: #2a1515; color: #f44336; border: 1px solid #5a2020; }
/* ── Override target with name + id ── */
.ov-target-name { font-size: 13px; }
.ov-target-id { font-size: 10px; color: var(--secondary); font-family: monospace; }
/* ── Scrollbar ── */
.content::-webkit-scrollbar { width: 8px; }
.content::-webkit-scrollbar-track { background: transparent; }
.content::-webkit-scrollbar-thumb { background: #2a2a36; border-radius: 4px; }
/* ── Confirm Modal ── */
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; }
.modal-box { background: #1a1a22; border-radius: 12px; padding: 24px; width: 380px; max-width: 90vw; text-align: center; position: relative; }
.confirm-box h2 { margin: 0 0 12px; font-size: 18px; color: var(--text); }
.confirm-box p { margin: 0; color: var(--secondary); }
.modal-close { position: absolute; top: 10px; right: 14px; background: none; border: none; color: #888; font-size: 22px; cursor: pointer; }
.modal-close:hover { color: white; }
.confirm-box .btn { min-width: 80px; }
.del-btn[title] { position: relative; }

/* ── Mobile sidebar ── */
.hamburger { display: none; position: fixed; top: 14px; left: 14px; z-index: 100; background: var(--sidebar); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 20px; padding: 6px 10px; cursor: pointer; }
.sidebar-overlay { display: none; }
@media (max-width: 700px) {
  .hamburger { display: block; }
  .body-wrap .sidebar { position: fixed; top: 0; left: -220px; width: 220px; height: 100vh; z-index: 99; transition: left 0.2s; }
  .body-wrap .sidebar.open { left: 0; }
  .sidebar-overlay.open { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 98; }
  .body-wrap { padding-top: 0; }
  .header { padding-left: 50px; }
}

/* ── Settings tab ── */
.settings-row { margin-bottom: 16px; }
.settings-row label { display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--secondary); margin-bottom: 6px; }
.settings-row input, .settings-row select { background: #22222c; border: 1px solid #333; color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 14px; width: 100%; max-width: 300px; }
.settings-row input:focus, .settings-row select:focus { outline: none; border-color: var(--accent); }
.settings-help { font-size: 12px; color: var(--secondary); margin-top: 4px; }

/* ── Setup checklist ── */
.setup-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; }
.setup-item .check { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #444; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; }
.setup-item .check.done { border-color: var(--green); background: var(--green); color: #fff; }
.setup-item .setup-text { font-size: 13px; flex: 1; }
.setup-item .setup-action { font-size: 12px; }

/* ── Permissions tab ── */

</style>
</head>
<body>

<div class="header">
  <button class="hamburger" id="hamburger" aria-label="Toggle sidebar">☰</button>
  <div style="display:flex;align-items:center;gap:12px">
    <a href="/dashboard" class="back-btn">← Dashboard</a>
    <h1>Cassie</h1>
    <a href="/" style="color:#555;font-size:11px;text-decoration:none">Home</a>
    <a href="/privacy" style="color:#555;font-size:11px;text-decoration:none">Privacy</a>
    <a href="/terms" style="color:#555;font-size:11px;text-decoration:none">Terms</a>
    <a id="guild-support" href="#" style="color:#555;font-size:11px;text-decoration:none">Support</a>
  </div>
  <div id="guild-header">
    <span id="guild-name">Loading...</span>
    <img id="guild-icon" src="" alt="" style="display:none">
  </div>
</div>

<div class="body-wrap">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-item active" data-tab="overview">📊 Overview</div>
    <div class="sidebar-item" data-tab="commands">⚙️ Commands</div>
    <div class="sidebar-item" data-tab="overrides">🔐 Overrides</div>
    <div class="sidebar-item" data-tab="tags">🏷️ Tags</div>
    <div class="sidebar-item" data-tab="settings">⚡ Settings</div>
  </div>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="content" id="content"></div>
</div>

<!-- Confirm Modal -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal-box confirm-box">
    <button class="modal-close" id="confirmClose">&times;</button>
    <h2 id="confirmTitle">Confirm</h2>
    <p id="confirmMsg" style="font-size:14px;line-height:1.5"></p>
    <p id="confirmNote" style="font-size:11px;color:#888;margin-top:8px;display:none"></p>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:18px">
      <button class="btn btn-ghost" id="confirmCancel">Cancel</button>
      <button class="btn btn-red" id="confirmOk">Delete</button>
    </div>
  </div>
</div>

<script>
const guildId = window.location.pathname.split('/')[2];

// ── Utilities ──
async function api(url, opts = {}) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 10000);
  try {
    const res = await fetch(url, { ...opts, credentials: 'include', signal: controller.signal });
    clearTimeout(timeout);
    return res.json();
  } catch (e) {
    clearTimeout(timeout);
    return { ok: false, error: e.name === 'AbortError' ? 'timeout' : 'network_error' };
  }
}

function escape(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function showMsg(inner, type = 'error') {
  const el = document.getElementById('content');
  el.innerHTML = `<div class="msg msg-${type}">${inner}</div>`;
}

function confirmAsync(title, msg, note) {
  return new Promise(resolve => {
    const overlay = document.getElementById('confirmModal');
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmMsg').innerHTML = msg;
    const noteEl = document.getElementById('confirmNote');
    if (note) { noteEl.textContent = note; noteEl.style.display = ''; }
    else { noteEl.style.display = 'none'; }
    const ok = document.getElementById('confirmOk');
    const cancel = document.getElementById('confirmCancel');
    const close = document.getElementById('confirmClose');
    const done = result => {
      overlay.style.display = 'none';
      ok.onclick = cancel.onclick = close.onclick = overlay.onclick = null;
      resolve(result);
    };
    ok.onclick = () => done(true);
    cancel.onclick = () => done(false);
    close.onclick = () => done(false);
    overlay.onclick = e => { if (e.target === overlay) done(false); };
    overlay.style.display = 'flex';
    // Keyboard shortcuts
    const keydown = e => {
      if (e.key === 'Escape') { done(false); document.removeEventListener('keydown', keydown); }
      if (e.key === 'Enter') { done(true); document.removeEventListener('keydown', keydown); }
    };
    document.addEventListener('keydown', keydown);
  });
}

// ── Sidebar ──
function setActiveTab(tab) {
  document.querySelectorAll('.sidebar-item').forEach(s => {
    s.classList.toggle('active', s.dataset.tab === tab);
  });
}

function switchTab(tab) {
  setActiveTab(tab);
  loadTab(tab);
  window.location.hash = tab;
}

document.querySelectorAll('.sidebar-item').forEach(item => {
  item.addEventListener('click', () => {
    switchTab(item.dataset.tab);
  });
});

// ── Mobile sidebar toggle ──
document.addEventListener('click', (e) => {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  const hamburger = document.getElementById('hamburger');
  if (e.target === hamburger || e.target.closest('#hamburger')) {
    sidebar.classList.toggle('open');
    overlay.classList.toggle('open');
    return;
  }
  if (e.target === overlay || e.target.closest('.sidebar-overlay')) {
    sidebar.classList.remove('open');
    overlay.classList.remove('open');
  }
});

// Close sidebar when a tab is selected on mobile
document.addEventListener('click', (e) => {
  const item = e.target.closest('.sidebar-item');
  if (item && window.innerWidth <= 700) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
  }
});

// ── Close autocomplete on outside click ──
document.addEventListener('click', (e) => {
  const wrap = document.getElementById('ov-target-list');
  if (wrap && !e.target.closest('.autocomplete-wrap')) {
    wrap.style.display = 'none';
  }
});

// Autocomplete item selection via event delegation
document.addEventListener('click', (e) => {
  const item = e.target.closest('.ac-item');
  if (item) {
    selectTarget(item.dataset.id, item.dataset.label);
  }
});

// ── Overview Tab ──
async function loadOverview() {
  const el = document.getElementById('content');
  el.innerHTML = '<div class="loading">Loading stats...</div>';

  const data = await api(`/api/data/guild-stats?guildId=${guildId}`);
  if (!data.ok) { showMsg('Failed to load stats.'); return; }
  const s = data.stats;

  // Guild header
  document.getElementById('guild-name').textContent = s.guildName;
  if (s.guildIcon) {
    const icon = document.getElementById('guild-icon');
    icon.src = s.guildIcon;
    icon.style.display = '';
  }

  let html = '<div class="section-title">Server Stats</div><div class="stat-grid">';

  const stats = [
    { label: 'Members', value: s.memberCount.toLocaleString() },
    { label: 'Channels', value: s.channelCount.toLocaleString() },
    { label: 'Roles', value: s.roleCount.toLocaleString() },
    { label: 'Commands Used', value: (s.totalCommands || 0).toLocaleString() },
    { label: 'Disabled Cmds', value: (s.disabledCmdCount || 0).toLocaleString() },
    { label: 'Overrides', value: (s.overrideCount || 0).toLocaleString() },
    { label: 'Echo Chambers', value: (s.echoChamberCount || 0).toLocaleString() },
    { label: 'Announcements', value: s.announcementSubscribed ? 'Active' : 'Inactive' },
    { label: 'Tags', value: (s.tagCount || 0).toLocaleString() },
  ];
  for (const st of stats) {
    html += `<div class="stat-card"><div class="stat-label">${st.label}</div><div class="stat-value">${st.value}</div></div>`;
  }
  html += '</div>';

  html += `<div class="section-title">Bot Prefix</div>
    <div class="prefix-row">
      <label>Prefix</label>
      <input type="text" id="prefix-input" value="${escape(s.prefix)}" maxlength="10">
      <button class="btn" onclick="savePrefix()">Save</button>
      <span class="status" id="prefix-status">Saved</span>
    </div>`;

  // Setup checklist
  html += '<div class="section-title" style="margin-top:24px">Getting Started</div>';
  const checks = [
    { label: 'Set your custom prefix', check: s.prefix !== 'c.', tip: 'Change it below' },
    { label: 'Configure command permissions', check: s.overrideCount > 0, tip: 'Use the Overrides tab' },
    { label: 'Create your first tag', check: s.tagCount > 0, tip: 'Use the Tags tab' },
    { label: 'Disable unwanted commands', check: s.disabledCmdCount > 0, tip: 'Use the Commands tab' },
  ];
  for (const c of checks) {
    html += `<div class="setup-item"><div class="check ${c.check ? 'done' : ''}">${c.check ? '✓' : ''}</div>
      <span class="setup-text">${c.label}</span>
      <span class="setup-action" style="color:var(--secondary);font-size:12px">${c.check ? '' : c.tip}</span></div>`;
  }

  el.innerHTML = html;
}

async function savePrefix() {
  const input = document.getElementById('prefix-input');
  const status = document.getElementById('prefix-status');
  const prefix = input.value.trim();
  if (!prefix) return;
  const data = await api('/api/data/guild-settings-update', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ guildId, prefix }),
  });
  if (data.ok) {
    status.classList.add('show');
    setTimeout(() => status.classList.remove('show'), 2000);
  }
}

// ── Commands Tab ──
async function loadCommands() {
  const el = document.getElementById('content');
  el.innerHTML = '<div class="loading">Loading commands...</div>';

  const data = await api(`/api/data/guild-commands?guildId=${guildId}`);
  if (!data.ok) { showMsg('Failed to load commands.'); return; }

  let html = '<div class="section-title">Commands</div>';
  html += '<input type="text" class="search-input" id="cmd-search" placeholder="Search commands..." oninput="filterCommands()">';
  html += '<div class="info-card">Toggle a command <strong>OFF</strong> to disable it <strong>server-wide</strong>. Disabling a parent command also disables all its subcommands. Then use the <a onclick="switchTab(\'overrides\')">Overrides</a> tab to add exceptions for specific channels, roles, or users.</div>';
  html += '<div id="cmd-list"></div>';
  el.innerHTML = html;

  // Build parent → children map for arbitrary depth
  const childrenByParent = {};
  for (const cmd of data.commands) {
    const pid = cmd.parentId || '__root__';
    if (!childrenByParent[pid]) childrenByParent[pid] = [];
    childrenByParent[pid].push(cmd);
  }

  // Render a command node and all its descendants recursively
  function renderNode(cmd, depth) {
    const hasChildren = childrenByParent[cmd.id] && childrenByParent[cmd.id].length > 0;
    const rowClass = hasChildren ? 'parent-row' : 'child-row';
    const nameClass = hasChildren ? 'cmd-parent' : 'cmd-child';
    const indent = depth * 18;
    const on = cmd.disabled ? '' : ' on';
    let html = `<div class="command-row ${rowClass}" data-name="${escape(cmd.name).toLowerCase()}" style="margin-left:${indent}px">
      <span class="cmd-name ${nameClass}">${escape(cmd.name)}</span>
      <div class="toggle${on}" data-id="${cmd.id}" data-disabled="${cmd.disabled}" onclick="toggleCmd(this)"></div>
    </div>`;
    const children = (childrenByParent[cmd.id] || []).sort((a, b) =>
      a.name.localeCompare(b.name),
    );
    for (const child of children) {
      html += renderNode(child, depth + 1);
    }
    return html;
  }

  let listHtml = '';
  const roots = (childrenByParent['__root__'] || []).sort((a, b) =>
    a.name.localeCompare(b.name),
  );
  for (const root of roots) {
    listHtml += `<div class="command-group" data-group="${escape(root.name)}">`;
    listHtml += renderNode(root, 0);
    listHtml += '</div>';
  }
  document.getElementById('cmd-list').innerHTML = listHtml;
  console.log('[Commands] loaded', data.commands.length, 'commands, disabled IDs:', data.debug?.disabledIds);
}

async function toggleCmd(el) {
  const cmdId = el.dataset.id;
  const newDisabled = el.dataset.disabled !== 'true';

  // Optimistic toggle
  el.dataset.disabled = String(newDisabled);
  el.classList.toggle('on', !newDisabled);

  const data = await api('/api/data/guild-command-toggle', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ guildId, commandId: cmdId, disabled: newDisabled }),
  });

  // Always refetch to sync every toggle with the real server state
  const cmdData = await api(`/api/data/guild-commands?guildId=${guildId}`);
  if (cmdData.ok) {
    const disabledMap = {};
    for (const cmd of cmdData.commands) {
      disabledMap[cmd.id] = cmd.disabled;
    }
    document.querySelectorAll('.toggle').forEach(t => {
      const id = t.dataset.id;
      if (disabledMap[id] !== undefined) {
        const isDisabled = disabledMap[id];
        t.dataset.disabled = String(isDisabled);
        t.classList.toggle('on', !isDisabled);
      }
    });
    // Update cached disabled set for the Overrides tab badges
    _ovDisabledSet = new Set(
      cmdData.commands.filter(c => c.disabled).map(c => c.id)
    );
  } else if (!data.ok) {
    // API failed AND refetch failed — revert the optimistic toggle
    el.dataset.disabled = String(!newDisabled);
    el.classList.toggle('on', newDisabled);
  }
}

function filterCommands() {
  const q = document.getElementById('cmd-search').value.toLowerCase();
  document.querySelectorAll('.command-row').forEach(row => {
    row.style.display = row.dataset.name.includes(q) ? '' : 'none';
  });
  document.querySelectorAll('.command-group').forEach(g => {
    const visible = [...g.querySelectorAll('.command-row')].some(r => r.style.display !== 'none');
    g.style.display = visible ? '' : 'none';
  });
}

// ── Overrides Tab ──
let targetData = { channels: [], roles: [], members: [] };
let selectedTargetId = '';
let _ovDisabledSet = new Set();
let _ovCmdNames = {};
let _ovCmdParent = {};
let _ovChildrenMap = {};

function _fullCmdName(id) {
  const parts = [];
  let cur = id;
  while (cur && _ovCmdNames[cur]) {
    parts.unshift(_ovCmdNames[cur]);
    cur = _ovCmdParent[cur];
  }
  return parts.join(' ');
}
let _memberSearchTimeout = null;

function getTargetName(type, id) {
  const arr = type === 'channel' ? targetData.channels
    : type === 'role' ? targetData.roles
    : targetData.members;
  const found = arr.find(t => t.id === id);
  if (!found) return null;
  if (type === 'user') {
    return found.displayName && found.displayName !== found.username
      ? `${found.username} (${found.displayName})`
      : found.username;
  }
  return found.name;
}

async function loadOverrides() {
  const el = document.getElementById('content');
  el.innerHTML = '<div class="loading">Loading overrides...</div>';

  // Fetch overrides, commands, and target data in parallel
  const [ovData, cmdData, tgtData] = await Promise.all([
    api(`/api/data/guild-overrides-list?guildId=${guildId}`),
    api(`/api/data/guild-commands?guildId=${guildId}`),
    api(`/api/data/guild-targets?guildId=${guildId}`),
  ]);

  if (!ovData.ok) { showMsg('Failed to load overrides.'); return; }

  // Cache target data for autocomplete
  if (tgtData.ok) targetData = tgtData;

  // Build command lookups
  _ovCmdNames = {};
  _ovCmdParent = {};
  _ovDisabledSet = new Set();
  _ovChildrenMap = {};
  if (cmdData.ok) {
    for (const cmd of cmdData.commands) {
      _ovCmdNames[cmd.id] = cmd.name;
      if (cmd.disabled) _ovDisabledSet.add(cmd.id);
      if (cmd.parentId) {
        _ovCmdParent[cmd.id] = cmd.parentId;
        if (!_ovChildrenMap[cmd.parentId]) _ovChildrenMap[cmd.parentId] = [];
        _ovChildrenMap[cmd.parentId].push(cmd.id);
      }
    }
  }

  // ── Hierarchy info box ──
  let html = `<div class="hierarchy-box">
    <div class="h-title">How Overrides Work</div>
    <div class="h-row h-top"><span>👤</span> User <span style="color:var(--secondary);font-size:12px">— highest priority</span></div>
    <div class="h-row"><span class="h-arrow">↑</span></div>
    <div class="h-row"><span>🔷</span> Role</div>
    <div class="h-row"><span class="h-arrow">↑</span></div>
    <div class="h-row"><span>📢</span> Channel</div>
    <div class="h-row"><span class="h-arrow">↑</span></div>
    <div class="h-row h-bot"><span>🏠</span> Server-wide <span style="color:var(--secondary);font-size:12px">— set in <a onclick="switchTab('commands')">Commands</a> tab</span></div>
    <div class="h-tip">💡 <strong>Tip:</strong> Disable a command server-wide in the <a onclick="switchTab('commands')">Commands</a> tab, then add <strong>Allow</strong> overrides here for the channels/roles/users that should still be able to use it.</div>
  </div>`;

  html += '<div class="section-title">Add Override</div>';

  // Build command options (sorted alphabetically by full path)
  let cmdOpts = '<option value="">Select command...</option>';
  if (cmdData.ok) {
    const sorted = [...cmdData.commands].sort((a, b) => {
      return _fullCmdName(a.id).localeCompare(_fullCmdName(b.id));
    });
    for (const cmd of sorted) {
      cmdOpts += `<option value="${cmd.id}">${escape(_fullCmdName(cmd.id))}</option>`;
    }
  }

  html += `<div class="add-override">
    <select id="ov-type" onchange="onOvTypeChange()"><option value="channel">Channel</option><option value="role">Role</option><option value="user">User</option></select>
    <div class="autocomplete-wrap">
      <input id="ov-target-input" placeholder="Type to search..." oninput="onOvTargetInput()" onfocus="onOvTargetInput()" autocomplete="off">
      <div class="autocomplete-list" id="ov-target-list"></div>
      <input type="hidden" id="ov-target">
    </div>
    <select id="ov-cmd" style="max-width:200px" onchange="onOvCmdChange()">${cmdOpts}</select>
    <span id="ov-cmd-badge"></span>
    <label id="ov-include-subs-wrap" style="display:none;font-size:12px"><input type="checkbox" id="ov-include-subs"> Include subcommands</label>
    <label><input type="checkbox" id="ov-allowed" checked> Allow</label>
    <button class="btn" onclick="addOverride()">Add</button>
  </div>`;

  html += '<div class="section-title">Existing Overrides</div>';
  html += '<input type="text" class="search-input" id="ov-search" placeholder="Search overrides..." oninput="filterOverrides()" style="margin-bottom:8px">';

  const sections = [
    { label: 'Channel', key: 'channels', idKey: 'channelId', type: 'channel' },
    { label: 'Role', key: 'roles', idKey: 'roleId', type: 'role' },
    { label: 'User', key: 'users', idKey: 'userId', type: 'user' },
  ];

  const allOverrides = [];
  for (const sec of sections) {
    for (const ov of ovData[sec.key] || []) {
      allOverrides.push({ type: sec.type, label: sec.label, targetId: ov[sec.idKey], commandId: ov.commandId, allowed: ov.allowed });
    }
  }

  // Group overrides by (type, target) and build command trees
  const groups = {};
  for (const ov of allOverrides) {
    const key = `${ov.type}:${ov.targetId}`;
    if (!groups[key]) groups[key] = { type: ov.type, targetId: ov.targetId, label: ov.label, overrides: [] };
    groups[key].overrides.push(ov);
  }

  if (allOverrides.length === 0) {
    html += '<div style="color:var(--secondary);font-size:13px">No overrides configured.</div>';
  } else {
    html += '<table class="override-table"><thead><tr><th>Type</th><th>Target</th><th>Command</th><th>Access</th><th></th></tr></thead><tbody>';

    let groupIdx = 0;
    for (const key in groups) {
      const group = groups[key];
      const tgtName = getTargetName(group.type, group.targetId);
      let tgtHtml;
      if (tgtName) {
        tgtHtml = `<div class="ov-target-name">${escape(tgtName)}</div><div class="ov-target-id">${escape(group.targetId)}</div>`;
      } else {
        tgtHtml = `<span class="ov-target-id">${escape(group.targetId)}</span>`;
      }

      // Build tree: find root commands (no parent in this group)
      const cmdIds = new Set(group.overrides.map(o => o.commandId));

      const roots = group.overrides.filter(o => {
        const parentId = _ovCmdParent[o.commandId];
        return !parentId || !cmdIds.has(parentId);
      });
      roots.sort((a, b) => _fullCmdName(a.commandId).localeCompare(_fullCmdName(b.commandId)));

      // Flatten tree to rows with proper tree-drawing prefixes
      function flattenChildren(parentOv, depth, ancestorPrefix) {
        const rows = [];
        const children = group.overrides
          .filter(o => _ovCmdParent[o.commandId] === parentOv.commandId)
          .sort((a, b) => _fullCmdName(a.commandId).localeCompare(_fullCmdName(b.commandId)));
        for (let i = 0; i < children.length; i++) {
          const isLast = i === children.length - 1;
          const connector = isLast ? '└ ' : '├ ';
          const prefix = ancestorPrefix + connector;
          rows.push({ ov: children[i], depth: depth + 1, prefix });
          const childPrefix = ancestorPrefix + (isLast ? '   ' : '│  ');
          rows.push(...flattenChildren(children[i], depth + 1, childPrefix));
        }
        return rows;
      }

      const treeRows = [];
      for (const root of roots) {
        treeRows.push({ ov: root, depth: 0, prefix: '' });
        treeRows.push(...flattenChildren(root, 0, ''));
      }

      // Render rows with indentation
      const bgColor = groupIdx % 2 === 0 ? '' : 'background:rgba(255,255,255,0.02)';
      groupIdx++;

      for (let i = 0; i < treeRows.length; i++) {
        const { ov, depth, prefix } = treeRows[i];
        const name = _fullCmdName(ov.commandId) || ov.commandId.slice(0, 8) + '...';

        html += `<tr data-type="${ov.type}" data-target="${ov.targetId}" data-command="${ov.commandId}" style="${bgColor}">
          <td>${ov.label}</td>
          <td>${tgtHtml}</td>
          <td style="font-size:13px">${depth > 0 ? `<span style="color:#555;font-family:monospace;white-space:pre">${escape(prefix)}</span>` : ''}${escape(name)}</td>
          <td style="color:${ov.allowed ? 'var(--green)' : 'var(--red)'}">${ov.allowed ? 'Allow' : 'Deny'}</td>
          <td><button class="del-btn" title="Alt+click to skip confirm" onclick="deleteOverride(event,'${ov.type}','${ov.targetId}','${ov.commandId}')">✕</button></td>
        </tr>`;
      }
    }
    html += '</tbody></table>';
  }

  el.innerHTML = html;
}

function onOvCmdChange() {
  const badge = document.getElementById('ov-cmd-badge');
  const cmdId = document.getElementById('ov-cmd').value;
  if (!cmdId) {
    badge.innerHTML = '';
    document.getElementById('ov-include-subs-wrap').style.display = 'none';
    return;
  }
  const disabled = _ovDisabledSet.has(cmdId);
  badge.innerHTML = `<span class="state-badge ${disabled ? 'disabled' : 'enabled'}">${disabled ? 'Disabled' : 'Enabled'}</span>`;
  // Show "Include subcommands" checkbox if this command has children
  const hasChildren = _ovChildrenMap[cmdId] && _ovChildrenMap[cmdId].length > 0;
  document.getElementById('ov-include-subs-wrap').style.display = hasChildren ? '' : 'none';
}

function onOvTypeChange() {
  if (_memberSearchTimeout) {
    clearTimeout(_memberSearchTimeout);
    _memberSearchTimeout = null;
  }
  document.getElementById('ov-target-input').value = '';
  document.getElementById('ov-target').value = '';
  selectedTargetId = '';
  document.getElementById('ov-target-list').style.display = 'none';
}

function onOvTargetInput() {
  const type = document.getElementById('ov-type').value;
  const q = document.getElementById('ov-target-input').value.toLowerCase().trim();
  const list = document.getElementById('ov-target-list');

  // Clear hidden input when user types — forces explicit selection from dropdown
  document.getElementById('ov-target').value = '';
  selectedTargetId = '';

  // Cancel any pending member search
  if (_memberSearchTimeout) {
    clearTimeout(_memberSearchTimeout);
    _memberSearchTimeout = null;
  }

  // User search uses the server-side API
  if (type === 'user') {
    if (q.length < 2) {
      list.style.display = 'none';
      return;
    }
    list.innerHTML = '<div class="ac-item" style="color:var(--secondary);cursor:default">Searching...</div>';
    list.style.display = 'block';
    _memberSearchTimeout = setTimeout(async () => {
      const data = await api(`/api/data/guild-member-search?guildId=${guildId}&q=${encodeURIComponent(q)}`);
      if (!data.ok || !data.members || data.members.length === 0) {
        list.innerHTML = '<div class="ac-item" style="color:var(--secondary);cursor:default">No users found</div>';
        list.style.display = q.length >= 2 ? 'block' : 'none';
        return;
      }
      let html = '';
      for (const m of data.members.slice(0, 50)) {
        const label = m.displayName && m.displayName !== m.username
          ? `${m.username} (${m.displayName})`
          : m.username;
        html += `<div class="ac-item" data-id="${escape(m.id)}" data-label="${escape(label)}">
          ${escape(label)}
          <span class="ac-id">${escape(m.id)}</span>
        </div>`;
      }
      list.innerHTML = html;
      list.style.display = 'block';
    }, 300);
    return;
  }

  // Channels and roles — filter from cached data
  const items = type === 'channel' ? (targetData.channels || []) : (targetData.roles || []);
  if (!q || items.length === 0) { list.style.display = 'none'; return; }

  const filtered = items
    .map(item => {
      const label = item.name;
      const idx = label.toLowerCase().indexOf(q);
      const idIdx = item.id.startsWith(q) ? 0 : -1;
      return { item, label, score: idIdx === 0 ? 0 : (idx >= 0 ? idx : 999) };
    })
    .filter(x => x.score < 999)
    .sort((a, b) => a.score - b.score);

  if (filtered.length === 0) { list.style.display = 'none'; return; }

  let html = '';
  for (const { item, label } of filtered.slice(0, 50)) {
    const color = type === 'role' && item.color && item.color !== '#000000'
      ? `<span style="color:${item.color};font-size:16px">●</span>`
      : '';
    html += `<div class="ac-item" data-id="${escape(item.id)}" data-label="${escape(label)}">
      ${color}${escape(label)}
      <span class="ac-id">${escape(item.id)}</span>
    </div>`;
  }
  list.innerHTML = html;
  list.style.display = 'block';
}

function selectTarget(id, label) {
  document.getElementById('ov-target-input').value = label;
  document.getElementById('ov-target').value = id;
  selectedTargetId = id;
  document.getElementById('ov-target-list').style.display = 'none';
}

function _collectDescendants(cmdId, map) {
  const ids = [];
  const children = map[cmdId] || [];
  for (const childId of children) {
    ids.push(childId, ..._collectDescendants(childId, map));
  }
  return ids;
}

async function addOverride() {
  const type = document.getElementById('ov-type').value;
  const targetId = document.getElementById('ov-target').value;
  const commandId = document.getElementById('ov-cmd').value;
  const allowed = document.getElementById('ov-allowed').checked;
  if (!targetId || !commandId) { showMsg('Select a target and command.', 'error'); return; }

  const ids = [commandId];
  const includeSubs = document.getElementById('ov-include-subs');
  if (includeSubs.style.display !== 'none' && includeSubs.checked) {
    ids.push(..._collectDescendants(commandId, _ovChildrenMap));
  }

  // Show loading state
  const btn = document.querySelector('.add-override .btn');
  const origText = btn.textContent;
  btn.textContent = 'Saving...';
  btn.disabled = true;

  const results = await Promise.all(ids.map(id =>
    api('/api/data/guild-overrides', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ guildId, type, targetId, commandId: id, allowed }),
    })
  ));

  btn.textContent = origText;
  btn.disabled = false;

  if (results.every(r => r.ok)) loadOverrides();
  else showMsg('Failed to add some overrides.', 'error');
}

function filterOverrides() {
  const q = document.getElementById('ov-search').value.toLowerCase();
  document.querySelectorAll('.override-table tbody tr').forEach(row => {
    row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

async function deleteOverride(ev, type, targetId, commandId) {
  // Alt+click → skip all confirmations
  const skipConfirm = ev.altKey;

  // Find child overrides first (before any API calls)
  const childIds = _collectDescendants(commandId, _ovChildrenMap);
  const childRows = [];
  if (childIds.length > 0) {
    const table = document.querySelector('.override-table');
    if (table) {
      for (const row of table.querySelectorAll('tbody tr')) {
        if (childIds.includes(row.dataset.command) && row.dataset.type === type && row.dataset.target === targetId) {
          childRows.push(row);
        }
      }
    }
  }

  const cmdLabel = _fullCmdName(commandId) || commandId.slice(0, 8);

  // Ask both questions before any deletion
  if (!skipConfirm) {
    if (!(await confirmAsync('Delete Override', `Remove override for <code style="background:#222;padding:2px 6px;border-radius:4px;font-size:13px">${escape(cmdLabel)}</code>?`, 'Alt+click ✕ to skip confirmations'))) return;
  }

  let deleteChildren = false;
  if (!skipConfirm && childRows.length > 0) {
    deleteChildren = await confirmAsync(
      'Subcommand Overrides',
      `Also delete <strong>${childRows.length}</strong> subcommand override${childRows.length > 1 ? 's' : ''} for this target?`,
      'Click No to keep subcommand overrides'
    );
  } else if (skipConfirm && childRows.length > 0) {
    deleteChildren = true; // Alt+click deletes everything
  }

  // NOW do all deletions
  const results = await Promise.all([
    api('/api/data/guild-overrides-delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ guildId, type, targetId, commandId }),
    }),
    ...(deleteChildren ? childRows.map(row =>
      api('/api/data/guild-overrides-delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ guildId, type, targetId, commandId: row.dataset.command }),
      })
    ) : []),
  ]);
  if (!results[0].ok) return;

  // Remove rows from DOM
  if (deleteChildren) childRows.forEach(r => r.remove());
  const mainRow = ev?.target?.closest?.('tr');
  if (mainRow) mainRow.remove();

  // If last row, show empty state
  const tbody = document.querySelector('.override-table tbody');
  if (tbody && !tbody.querySelector('tr')) {
    const table = tbody.closest('table');
    const search = table.previousElementSibling;
    const sectionTitle = search?.previousElementSibling || table.previousElementSibling;
    table.remove();
    if (search?.id === 'ov-search') search.remove();
    sectionTitle.insertAdjacentHTML('afterend', '<div style="color:var(--secondary);font-size:13px">No overrides configured.</div>');
  }
}

// ── Tags Tab ──
async function loadTags() {
  const el = document.getElementById('content');
  el.innerHTML = '<div class="loading">Loading tags...</div>';

  const data = await api(`/api/data/guild-tags?guildId=${guildId}`);
  if (!data.ok) { showMsg('Failed to load tags.'); return; }

  let html = '<div class="section-title">Add Tag</div>';
  html += `<div class="add-tag">
    <input id="tag-name" placeholder="Tag name" style="width:150px">
    <textarea id="tag-content" placeholder="Tag content" style="width:300px" rows="1"></textarea>
    <button class="btn" onclick="createTag()">Create</button>
  </div>`;

  html += '<div class="section-title">Tags</div>';

  if (data.tags.length === 0) {
    html += '<div style="color:var(--secondary);font-size:13px">No tags yet.</div>';
  } else {
    for (const tag of data.tags) {
      const date = new Date(tag.createdAt).toLocaleDateString();
      html += `<div class="tag-card" id="tag-${escape(tag.name)}">
        <div class="tag-name">${escape(tag.name)}</div>
        <div class="tag-meta">${tag.uses} uses · Created ${date}</div>
        <div class="tag-content" id="tagc-${escape(tag.name)}">${escape(tag.content)}</div>
        <div class="tag-actions">
          <button class="btn btn-sm btn-ghost" data-tagname="${escape(tag.name)}" onclick="editTag(this.dataset.tagname)">Edit</button>
          <button class="btn btn-sm btn-ghost" data-tagname="${escape(tag.name)}" style="color:var(--red)" onclick="deleteTag(this.dataset.tagname)">Delete</button>
        </div>
      </div>`;
    }
  }

  el.innerHTML = html;
}

async function createTag() {
  const name = document.getElementById('tag-name').value.trim();
  const content = document.getElementById('tag-content').value.trim();
  if (!name || !content) return;
  const data = await api('/api/data/guild-tags-create', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ guildId, name, content }),
  });
  if (data.ok) loadTags();
  else showMsg(data.error || 'Failed to create tag.', 'error');
}

function editTag(name) {
  const contentEl = document.getElementById(`tagc-${name}`);
  const currentText = contentEl.textContent;
  contentEl.innerHTML = `<div class="tag-edit-area"><textarea id="edit-${escape(name)}">${escape(currentText)}</textarea></div>
    <button class="btn btn-sm btn-green" data-tagname="${escape(name)}" onclick="saveTagEdit(this.dataset.tagname)">Save</button>
    <button class="btn btn-sm btn-ghost" onclick="loadTags()">Cancel</button>`;
}

async function saveTagEdit(name) {
  const content = document.getElementById(`edit-${name}`).value.trim();
  if (!content) return;
  const data = await api('/api/data/guild-tag-update', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ guildId, name, content }),
  });
  if (data.ok) loadTags();
}

async function deleteTag(name) {
  if (!(await confirmAsync('Delete Tag', `Remove tag <code style="background:#222;padding:2px 6px;border-radius:4px">${escape(name)}</code> permanently?`))) return;
  const data = await api('/api/data/guild-tags-delete', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ guildId, name }),
  });
  if (data.ok) loadTags();
}

// ── Settings Tab ──
async function loadSettings() {
  const el = document.getElementById('content');
  el.innerHTML = '<div class="loading">Loading settings...</div>';

  const [statsData, echoData, announceData] = await Promise.all([
    api(`/api/data/guild-stats?guildId=${guildId}`),
    api(`/api/data/guild-echo-chamber?guildId=${guildId}`),
    api(`/api/data/guild-announcement?guildId=${guildId}`),
  ]);
  if (!statsData.ok) { showMsg('Failed to load settings.'); return; }

  const prefix = statsData.stats?.prefix || 'c.';

  let html = '<div class="section-title">Server Settings</div>';

  // Prefix
  html += `<div class="settings-row">
    <label>Command Prefix</label>
    <div style="display:flex;gap:8px;align-items:center">
      <input type="text" id="settings-prefix" value="${escape(prefix)}" maxlength="10" style="max-width:100px">
      <button class="btn" onclick="saveSettingsPrefix()">Save</button>
      <span class="status" id="settings-prefix-status" style="font-size:12px;color:var(--green);opacity:0;transition:0.2s">Saved</span>
    </div>
    <div class="settings-help">The prefix used to invoke Cassie commands in this server (default: <code>c.</code>)</div>
  </div>`;

  // Echo Chamber
  html += `<div class="settings-row" style="margin-top:24px">
    <label>Echo Chamber</label>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px">`;
  if (echoData.ok && echoData.channels.length > 0) {
    for (const ch of echoData.channels) {
      const d1 = (ch.deleteDelayMin / 1000).toFixed(0);
      const d2 = ch.deleteDelayMax >= 86400000 ? '24h' : (ch.deleteDelayMax / 1000).toFixed(0) + 's';
      const e1 = ch.echoDelayMin === 0 ? '0s' : (ch.echoDelayMin / 1000).toFixed(0) + 's';
      const e2 = ch.echoDelayMax >= 86400000 ? '24h' : (ch.echoDelayMax / 1000).toFixed(0) + 's';
      html += `<div style="font-size:13px;margin-bottom:10px">
        <strong style="color:var(--text)">#${ch.channelId.slice(0,8)}…</strong>
        <span style="color:var(--secondary);margin-left:8px">${ch.pendingCount} pending</span>
      </div>
      <table style="width:100%;font-size:12px;color:var(--secondary);border-collapse:collapse">
        <tr><td style="padding:2px 8px 2px 0">Echo Chance</td><td>${ch.echoChance}%</td></tr>
        <tr><td style="padding:2px 8px 2px 0">Delete Delay</td><td>${d1}s – ${d2}</td></tr>
        <tr><td style="padding:2px 8px 2px 0">Echo Delay</td><td>${e1} – ${e2}</td></tr>
      </table>`;
      if (echoData.channels.length > 1) html += '<hr style="border-color:#2a2a36;margin:8px 0">';
    }
  } else {
    html += `<div style="font-size:13px;color:var(--secondary);margin-bottom:8px">
      No echo chambers set up. Use <code>${escape(prefix)}echochamber create</code> in a channel.</div>`;
  }
  html += `</div></div>`;

  // Announcements
  html += `<div class="settings-row" style="margin-top:24px">
    <label>Announcement Subscriptions</label>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px">`;
  if (announceData.ok) {
    if (announceData.subscribed) {
      html += `<div style="font-size:13px;color:var(--green);margin-bottom:6px">✓ Subscribed</div>
        <div style="font-size:12px;color:var(--secondary)">Channel: <code style="background:#222;padding:1px 5px;border-radius:3px">${announceData.channelId}</code></div>`;
    } else if (announceData.optedOut) {
      html += `<div style="font-size:13px;color:var(--secondary);margin-bottom:6px">Opted out of announcements.</div>`;
    } else {
      html += `<div style="font-size:13px;color:var(--secondary);margin-bottom:6px">Not set up. Run <code>${escape(prefix)}announce subscribe</code> in your announcement channel.</div>`;
    }
    if (announceData.lastNagged) {
      const d = new Date(announceData.lastNagged);
      html += `<div style="font-size:11px;color:#555;margin-top:4px">Last reminded: ${d.toLocaleDateString()}</div>`;
    }
  } else {
    html += `<div style="font-size:13px;color:var(--secondary)">Could not load announcement status.</div>`;
  }
  html += `</div></div>`;

  el.innerHTML = html;
}

async function saveSettingsPrefix() {
  const input = document.getElementById('settings-prefix');
  const status = document.getElementById('settings-prefix-status');
  const prefix = input.value.trim();
  if (!prefix) return;
  const data = await api('/api/data/guild-settings-update', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ guildId, prefix }),
  });
  if (data.ok) {
    status.style.opacity = '1';
    setTimeout(() => status.style.opacity = '0', 2000);
  }
}

// ── Router ──
async function loadTab(tab) {
  setActiveTab(tab);
  try {
    if (tab === 'overview') await loadOverview();
    else if (tab === 'commands') await loadCommands();
    else if (tab === 'overrides') await loadOverrides();
    else if (tab === 'tags') await loadTags();
    else if (tab === 'settings') await loadSettings();
  } catch (e) {
    console.error(e);
    showMsg('An error occurred.', 'error');
  }
}

const validTabs = ['overview', 'commands', 'overrides', 'tags', 'settings'];
const initialTab = validTabs.includes(window.location.hash.replace('#', '')) ? window.location.hash.replace('#', '') : 'overview';
loadTab(initialTab);

// Load support link
fetch('/api/invite/support')
  .then(r => r.json())
  .then(d => { if (d.ok) document.getElementById('guild-support').href = d.url; });
</script>
</body>
</html>
