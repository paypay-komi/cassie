<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cassie - Guild</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f13;
  --sidebar: #15151c;
  --card: #1a1a22;
  --hover: #22222c;
  --text: #fff;
  --secondary: #aaa;
  --accent: #5865F2;
  --green: #28a745;
  --red: #ed4245;
}
body {
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100vh;
}
/* ── Header ── */
.header {
  background: var(--sidebar);
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #2a2a36;
  flex-shrink: 0;
  z-index: 10;
}
.back-btn { color: var(--secondary); text-decoration: none; font-size: 13px; padding: 4px 10px; border-radius: 4px; transition: 0.15s; }
.back-btn:hover { color: var(--text); background: var(--hover); }
.header h1 { color: var(--accent); font-size: 18px; }
#guild-header {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  color: var(--secondary);
}
#guild-header img {
  width: 24px; height: 24px; border-radius: 6px;
}
/* ── Body (sidebar + content) ── */
.body-wrap {
  display: flex;
  flex: 1;
  overflow: hidden;
}
/* ── Sidebar ── */
.sidebar {
  width: 200px;
  background: var(--sidebar);
  padding: 12px 0;
  border-right: 1px solid #2a2a36;
  flex-shrink: 0;
  overflow-y: auto;
}
.sidebar-item {
  padding: 10px 16px;
  cursor: pointer;
  color: var(--secondary);
  font-size: 14px;
  transition: 0.15s;
  border-left: 3px solid transparent;
}
.sidebar-item:hover { background: var(--hover); color: var(--text); }
.sidebar-item.active {
  background: #2a2a36;
  color: var(--text);
  border-left-color: var(--accent);
}
/* ── Content ── */
.content {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}
/* ── Section titles ── */
.section-title {
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 16px;
  color: var(--text);
}
/* ── Stat grid ── */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--card);
  border: 1px solid #2a2a36;
  border-radius: 8px;
  padding: 16px;
}
.stat-card .stat-label {
  font-size: 11px;
  text-transform: uppercase;
  color: var(--secondary);
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}
.stat-card .stat-value {
  font-size: 22px;
  font-weight: bold;
}
/* ── Prefix row ── */
.prefix-row {
  background: var(--card);
  border: 1px solid #2a2a36;
  border-radius: 8px;
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.prefix-row label {
  font-size: 11px;
  text-transform: uppercase;
  color: var(--secondary);
  letter-spacing: 0.5px;
}
.prefix-row input {
  background: #22222c;
  border: 1px solid #333;
  color: var(--text);
  padding: 6px 10px;
  border-radius: 4px;
  font-size: 14px;
  width: 80px;
}
.prefix-row .status {
  font-size: 12px;
  color: var(--green);
  opacity: 0;
  transition: 0.2s;
}
.prefix-row .status.show { opacity: 1; }
/* ── Search input ── */
.search-input {
  background: var(--card);
  border: 1px solid #2a2a36;
  color: var(--text);
  padding: 8px 12px;
  border-radius: 4px;
  width: 100%;
  margin-bottom: 12px;
  font-size: 14px;
}
/* ── Command list ── */
.command-group { margin-bottom: 16px; }
.command-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 10px;
  border-radius: 4px;
}
.command-row .cmd-name { font-size: 14px; }
.parent-row {
  background: rgba(88,101,242,0.08);
  border: 1px solid rgba(88,101,242,0.2);
  border-radius: 6px;
  padding: 8px 10px;
  margin-bottom: 2px;
}
.parent-row .cmd-parent {
  font-weight: 700;
  color: var(--accent);
}
.child-row {
  padding-left: 10px;
  border-left: 2px solid #2a2a36;
}
.child-row .cmd-child {
  font-size: 13px;
  color: var(--secondary);
}
/* ── Toggle ── */
.toggle {
  width: 40px; height: 22px;
  border-radius: 11px;
  background: #444;
  cursor: pointer;
  position: relative;
  transition: 0.2s;
  flex-shrink: 0;
}
.toggle::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 16px; height: 16px;
  background: #fff;
  border-radius: 50%;
  transition: 0.2s;
}
.toggle.on { background: var(--accent); }
.toggle.on::after { transform: translateX(18px); }
/* ── Override table ── */
.override-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
.override-table th {
  text-align: left;
  padding: 8px;
  font-size: 11px;
  text-transform: uppercase;
  color: var(--secondary);
  border-bottom: 1px solid #2a2a36;
}
.override-table td {
  padding: 8px;
  font-size: 13px;
  border-bottom: 1px solid #2a2a36;
}
.override-table .del-btn {
  background: none; border: none; color: var(--red); cursor: pointer; font-size: 13px;
}
/* ── Add override form ── */
.add-override {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  align-items: center;
}
.add-override select, .add-override input {
  background: #22222c;
  border: 1px solid #333;
  color: var(--text);
  padding: 6px 10px;
  border-radius: 4px;
  font-size: 13px;
}
.add-override label { font-size: 12px; color: var(--secondary); display: flex; align-items: center; gap: 4px; }
/* ── Override target autocomplete ── */
.autocomplete-wrap { position: relative; width: 220px; }
.autocomplete-wrap input { width: 100%; }
.autocomplete-list {
  position: absolute; top: 100%; left: 0; right: 0;
  background: #1a1a22; border: 1px solid #333; border-top: none;
  max-height: 200px; overflow-y: auto; z-index: 100;
  display: none;
}
.autocomplete-list .ac-item {
  padding: 6px 10px; cursor: pointer; font-size: 13px;
  display: flex; align-items: center; gap: 8px;
}
.autocomplete-list .ac-item:hover { background: #2a2a36; }
.autocomplete-list .ac-item .ac-id {
  font-size: 10px; color: var(--secondary); font-family: monospace; margin-left: auto;
}
.autocomplete-list .ac-highlight { background: #2a2a36; }
/* ── Tags ── */
.tag-card {
  background: var(--card);
  border: 1px solid #2a2a36;
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 12px;
}
.tag-card .tag-name { font-weight: bold; font-size: 15px; margin-bottom: 6px; }
.tag-card .tag-meta { font-size: 11px; color: var(--secondary); margin-bottom: 6px; }
.tag-card .tag-content {
  background: #22222c;
  padding: 8px;
  border-radius: 4px;
  font-size: 13px;
  white-space: pre-wrap;
  word-break: break-word;
  margin-bottom: 8px;
}
.tag-card .tag-actions { display: flex; gap: 8px; }
.tag-card .tag-edit-area { margin-bottom: 8px; }
.tag-card .tag-edit-area textarea {
  width: 100%;
  background: #22222c;
  border: 1px solid #333;
  color: var(--text);
  padding: 8px;
  border-radius: 4px;
  font-size: 13px;
  resize: vertical;
  min-height: 60px;
}
.add-tag {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  align-items: center;
}
.add-tag input, .add-tag textarea {
  background: #22222c;
  border: 1px solid #333;
  color: var(--text);
  padding: 6px 10px;
  border-radius: 4px;
  font-size: 13px;
}
.add-tag textarea { min-height: 36px; resize: vertical; }
/* ── Buttons ── */
.btn {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 6px 14px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  transition: 0.15s;
}
.btn:hover { background: #4752C4; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-green { background: var(--green); }
.btn-green:hover { background: #218838; }
.btn-red { background: var(--red); }
.btn-red:hover { background: #c0392b; }
.btn-ghost { background: none; color: var(--accent); padding: 4px 8px; }
.btn-ghost:hover { background: var(--hover); }
/* ── Loading ── */
.loading {
  text-align: center;
  padding: 40px;
  color: var(--secondary);
  font-size: 14px;
}
/* ── Message ── */
.msg {
  padding: 12px;
  border-radius: 6px;
  font-size: 13px;
  margin-bottom: 12px;
}
.msg-error { background: #2a1515; border: 1px solid #5a2020; color: #ff6b6b; }
.msg-success { background: #152a15; border: 1px solid #205a20; color: #6bff6b; }
/* ── Info card ── */
.info-card {
  background: #15152a;
  border: 1px solid #2a2a4a;
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 13px;
  color: var(--secondary);
  margin-bottom: 16px;
  line-height: 1.5;
}
.info-card a {
  color: var(--accent);
  cursor: pointer;
  text-decoration: underline;
}
.info-card a:hover { color: #7983f5; }
.info-card strong { color: var(--text); }
/* ── Hierarchy box ── */
.hierarchy-box {
  background: #15152a;
  border: 1px solid #2a2a4a;
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 18px;
  font-size: 13px;
  line-height: 1.6;
}
.hierarchy-box .h-title {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--secondary);
  margin-bottom: 8px;
}
.hierarchy-box .h-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 3px 0;
  color: var(--secondary);
}
.hierarchy-box .h-row .h-arrow {
  color: #444;
  font-size: 11px;
  width: 14px;
  text-align: center;
}
.hierarchy-box .h-row.h-top { color: var(--text); }
.hierarchy-box .h-row.h-bot { color: #666; }
.hierarchy-box .h-tip {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid #2a2a4a;
  color: var(--secondary);
  font-size: 12px;
}
.hierarchy-box .h-tip a {
  color: var(--accent);
  cursor: pointer;
  text-decoration: underline;
}
/* ── State badge ── */
.state-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 2px 8px;
  border-radius: 10px;
  margin-left: 8px;
}
.state-badge.enabled { background: #152a15; color: #4caf50; border: 1px solid #2a5a2a; }
.state-badge.disabled { background: #2a1515; color: #f44336; border: 1px solid #5a2020; }
/* ── Override target with name + id ── */
.ov-target-name { font-size: 13px; }
.ov-target-id { font-size: 10px; color: var(--secondary); font-family: monospace; }
/* ── Scrollbar ── */
.content::-webkit-scrollbar { width: 8px; }
.content::-webkit-scrollbar-track { background: transparent; }
.content::-webkit-scrollbar-thumb { background: #2a2a36; border-radius: 4px; }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:12px">
    <a href="/dashboard" class="back-btn">← Dashboard</a>
    <h1>Cassie</h1>
    <a href="/privacy" style="color:#555;font-size:11px;text-decoration:none">Privacy</a>
    <a href="/terms" style="color:#555;font-size:11px;text-decoration:none">Terms</a>
  </div>
  <div id="guild-header">
    <span id="guild-name">Loading...</span>
    <img id="guild-icon" src="" alt="" style="display:none">
  </div>
</div>

<div class="body-wrap">
  <div class="sidebar">
    <div class="sidebar-item active" data-tab="overview">📊 Overview</div>
    <div class="sidebar-item" data-tab="commands">⚙️ Commands</div>
    <div class="sidebar-item" data-tab="overrides">🔐 Overrides</div>
    <div class="sidebar-item" data-tab="tags">🏷️ Tags</div>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
const guildId = window.location.pathname.split('/')[2];

// ── Utilities ──
async function api(url, opts = {}) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 10000);
  try {
    const res = await fetch(url, { ...opts, credentials: 'include', signal: controller.signal });
    clearTimeout(timeout);
    return res.json();
  } catch (e) {
    clearTimeout(timeout);
    return { ok: false, error: e.name === 'AbortError' ? 'timeout' : 'network_error' };
  }
}

function escape(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function showMsg(inner, type = 'error') {
  const el = document.getElementById('content');
  el.innerHTML = `<div class="msg msg-${type}">${inner}</div>`;
}

// ── Sidebar ──
function setActiveTab(tab) {
  document.querySelectorAll('.sidebar-item').forEach(s => {
    s.classList.toggle('active', s.dataset.tab === tab);
  });
}

function switchTab(tab) {
  setActiveTab(tab);
  loadTab(tab);
}

document.querySelectorAll('.sidebar-item').forEach(item => {
  item.addEventListener('click', () => {
    switchTab(item.dataset.tab);
  });
});

// Close autocomplete on outside click
document.addEventListener('click', (e) => {
  const wrap = document.getElementById('ov-target-list');
  if (wrap && !e.target.closest('.autocomplete-wrap')) {
    wrap.style.display = 'none';
  }
});

// Autocomplete item selection via event delegation
document.addEventListener('click', (e) => {
  const item = e.target.closest('.ac-item');
  if (item) {
    selectTarget(item.dataset.id, item.dataset.label);
  }
});

// ── Overview Tab ──
async function loadOverview() {
  const el = document.getElementById('content');
  el.innerHTML = '<div class="loading">Loading stats...</div>';

  const data = await api(`/api/data/guild-stats?guildId=${guildId}`);
  if (!data.ok) { showMsg('Failed to load stats.'); return; }
  const s = data.stats;

  // Guild header
  document.getElementById('guild-name').textContent = s.guildName;
  if (s.guildIcon) {
    const icon = document.getElementById('guild-icon');
    icon.src = s.guildIcon;
    icon.style.display = '';
  }

  let html = '<div class="section-title">Server Stats</div><div class="stat-grid">';

  const stats = [
    { label: 'Members', value: s.memberCount.toLocaleString() },
    { label: 'Channels', value: s.channelCount.toLocaleString() },
    { label: 'Roles', value: s.roleCount.toLocaleString() },
    { label: 'Commands Used', value: s.totalCommands.toLocaleString() },
  ];
  for (const st of stats) {
    html += `<div class="stat-card"><div class="stat-label">${st.label}</div><div class="stat-value">${st.value}</div></div>`;
  }
  html += '</div>';

  html += `<div class="section-title">Bot Prefix</div>
    <div class="prefix-row">
      <label>Prefix</label>
      <input type="text" id="prefix-input" value="${escape(s.prefix)}" maxlength="10">
      <button class="btn" onclick="savePrefix()">Save</button>
      <span class="status" id="prefix-status">Saved</span>
    </div>`;

  el.innerHTML = html;
}

async function savePrefix() {
  const input = document.getElementById('prefix-input');
  const status = document.getElementById('prefix-status');
  const prefix = input.value.trim();
  if (!prefix) return;
  const data = await api('/api/data/guild-settings-update', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ guildId, prefix }),
  });
  if (data.ok) {
    status.classList.add('show');
    setTimeout(() => status.classList.remove('show'), 2000);
  }
}

// ── Commands Tab ──
async function loadCommands() {
  const el = document.getElementById('content');
  el.innerHTML = '<div class="loading">Loading commands...</div>';

  const data = await api(`/api/data/guild-commands?guildId=${guildId}`);
  if (!data.ok) { showMsg('Failed to load commands.'); return; }

  let html = '<div class="section-title">Commands</div>';
  html += '<input type="text" class="search-input" id="cmd-search" placeholder="Search commands..." oninput="filterCommands()">';
  html += '<div class="info-card">Toggle a command <strong>OFF</strong> to disable it <strong>server-wide</strong>. Disabling a parent command also disables all its subcommands. Then use the <a onclick="switchTab(\'overrides\')">Overrides</a> tab to add exceptions for specific channels, roles, or users.</div>';
  html += '<div id="cmd-list"></div>';
  el.innerHTML = html;

  // Build parent → children map for arbitrary depth
  const childrenByParent = {};
  for (const cmd of data.commands) {
    const pid = cmd.parentId || '__root__';
    if (!childrenByParent[pid]) childrenByParent[pid] = [];
    childrenByParent[pid].push(cmd);
  }

  // Render a command node and all its descendants recursively
  function renderNode(cmd, depth) {
    const hasChildren = childrenByParent[cmd.id] && childrenByParent[cmd.id].length > 0;
    const rowClass = hasChildren ? 'parent-row' : 'child-row';
    const nameClass = hasChildren ? 'cmd-parent' : 'cmd-child';
    const indent = depth * 18;
    const on = cmd.disabled ? '' : ' on';
    let html = `<div class="command-row ${rowClass}" data-name="${escape(cmd.name).toLowerCase()}" style="margin-left:${indent}px">
      <span class="cmd-name ${nameClass}">${escape(cmd.name)}</span>
      <div class="toggle${on}" data-id="${cmd.id}" data-disabled="${cmd.disabled}" onclick="toggleCmd(this)"></div>
    </div>`;
    const children = (childrenByParent[cmd.id] || []).sort((a, b) =>
      a.name.localeCompare(b.name),
    );
    for (const child of children) {
      html += renderNode(child, depth + 1);
    }
    return html;
  }

  let listHtml = '';
  const roots = (childrenByParent['__root__'] || []).sort((a, b) =>
    a.name.localeCompare(b.name),
  );
  for (const root of roots) {
    listHtml += `<div class="command-group" data-group="${escape(root.name)}">`;
    listHtml += renderNode(root, 0);
    listHtml += '</div>';
  }
  document.getElementById('cmd-list').innerHTML = listHtml;
  console.log('[Commands] loaded', data.commands.length, 'commands, disabled IDs:', data.debug?.disabledIds);
}

async function toggleCmd(el) {
  const wasDisabled = el.dataset.disabled === 'true';
  const newDisabled = !wasDisabled;
  const cmdId = el.dataset.id;

  // Cascade only when toggling a parent row (has subcommands)
  const row = el.closest('.command-row');
  const isParent = row?.classList.contains('parent-row');
  const parentName = row?.dataset.name || '';
  const childToggles = isParent
    ? [...(row.closest('.command-group')?.querySelectorAll('.toggle') || [])]
        .filter(t => t.dataset.id !== cmdId)
        .filter(t => {
          const r = t.closest('.command-row');
          const n = r?.dataset.name || '';
          return n.startsWith(parentName + ' ');
        })
    : [];

  // Optimistic update — parent
  el.dataset.disabled = String(newDisabled);
  el.classList.toggle('on', wasDisabled);

  // Optimistic update — children (if parent, cascade visually)
  if (childToggles.length > 0) {
    for (const childEl of childToggles) {
      childEl.dataset.disabled = String(newDisabled);
      childEl.classList.toggle('on', wasDisabled);
    }
  }

  const data = await api('/api/data/guild-command-toggle', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ guildId, commandId: cmdId, disabled: newDisabled }),
  });
  if (!data.ok) {
    // Revert parent
    el.dataset.disabled = String(wasDisabled);
    el.classList.toggle('on', !wasDisabled);
    // Revert children
    if (childToggles.length > 0) {
      for (const childEl of childToggles) {
        childEl.dataset.disabled = String(wasDisabled);
        childEl.classList.toggle('on', !wasDisabled);
      }
    }
  }
  // If API returned extra (subcommands toggled server-side), sync their state
  else if (data.extra && data.extra.length > 0 && childToggles.length > 0) {
    // Server-side already handled the cascade; our optimistic update was correct
    // but if the user had manually changed a child before, the server overwrote it.
    // Sync the displayed state to match what the server did.
    // (We already set all children to match the parent, which matches the server cascade.)
  }
}

function filterCommands() {
  const q = document.getElementById('cmd-search').value.toLowerCase();
  document.querySelectorAll('.command-row').forEach(row => {
    row.style.display = row.dataset.name.includes(q) ? '' : 'none';
  });
  document.querySelectorAll('.command-group').forEach(g => {
    const visible = [...g.querySelectorAll('.command-row')].some(r => r.style.display !== 'none');
    g.style.display = visible ? '' : 'none';
  });
}

// ── Overrides Tab ──
let targetData = { channels: [], roles: [], members: [] };
let selectedTargetId = '';
let _ovDisabledSet = new Set();
let _ovCmdNames = {};
let _memberSearchTimeout = null;

function getTargetName(type, id) {
  const arr = type === 'channel' ? targetData.channels
    : type === 'role' ? targetData.roles
    : targetData.members;
  const found = arr.find(t => t.id === id);
  if (!found) return null;
  if (type === 'user') {
    return found.displayName && found.displayName !== found.username
      ? `${found.username} (${found.displayName})`
      : found.username;
  }
  return found.name;
}

async function loadOverrides() {
  const el = document.getElementById('content');
  el.innerHTML = '<div class="loading">Loading overrides...</div>';

  // Fetch overrides, commands, and target data in parallel
  const [ovData, cmdData, tgtData] = await Promise.all([
    api(`/api/data/guild-overrides-list?guildId=${guildId}`),
    api(`/api/data/guild-commands?guildId=${guildId}`),
    api(`/api/data/guild-targets?guildId=${guildId}`),
  ]);

  if (!ovData.ok) { showMsg('Failed to load overrides.'); return; }

  // Cache target data for autocomplete
  if (tgtData.ok) targetData = tgtData;

  // Build command lookups
  _ovCmdNames = {};
  _ovDisabledSet = new Set();
  if (cmdData.ok) {
    for (const cmd of cmdData.commands) {
      _ovCmdNames[cmd.id] = cmd.name;
      if (cmd.disabled) _ovDisabledSet.add(cmd.id);
    }
  }

  // ── Hierarchy info box ──
  let html = `<div class="hierarchy-box">
    <div class="h-title">How Overrides Work</div>
    <div class="h-row h-top"><span>👤</span> User <span style="color:var(--secondary);font-size:12px">— highest priority</span></div>
    <div class="h-row"><span class="h-arrow">↑</span></div>
    <div class="h-row"><span>🔷</span> Role</div>
    <div class="h-row"><span class="h-arrow">↑</span></div>
    <div class="h-row"><span>📢</span> Channel</div>
    <div class="h-row"><span class="h-arrow">↑</span></div>
    <div class="h-row h-bot"><span>🏠</span> Server-wide <span style="color:var(--secondary);font-size:12px">— set in <a onclick="switchTab('commands')">Commands</a> tab</span></div>
    <div class="h-tip">💡 <strong>Tip:</strong> Disable a command server-wide in the <a onclick="switchTab('commands')">Commands</a> tab, then add <strong>Allow</strong> overrides here for the channels/roles/users that should still be able to use it.</div>
  </div>`;

  html += '<div class="section-title">Add Override</div>';

  // Build command options
  let cmdOpts = '<option value="">Select command...</option>';
  if (cmdData.ok) {
    for (const cmd of cmdData.commands) {
      cmdOpts += `<option value="${cmd.id}">${escape(cmd.name)}</option>`;
    }
  }

  html += `<div class="add-override">
    <select id="ov-type" onchange="onOvTypeChange()"><option value="channel">Channel</option><option value="role">Role</option><option value="user">User</option></select>
    <div class="autocomplete-wrap">
      <input id="ov-target-input" placeholder="Type to search..." oninput="onOvTargetInput()" onfocus="onOvTargetInput()" autocomplete="off">
      <div class="autocomplete-list" id="ov-target-list"></div>
      <input type="hidden" id="ov-target">
    </div>
    <select id="ov-cmd" style="max-width:200px" onchange="onOvCmdChange()">${cmdOpts}</select>
    <span id="ov-cmd-badge"></span>
    <label><input type="checkbox" id="ov-allowed" checked> Allow</label>
    <button class="btn" onclick="addOverride()">Add</button>
  </div>`;

  html += '<div class="section-title">Existing Overrides</div>';

  const sections = [
    { label: 'Channel', key: 'channels', idKey: 'channelId', type: 'channel' },
    { label: 'Role', key: 'roles', idKey: 'roleId', type: 'role' },
    { label: 'User', key: 'users', idKey: 'userId', type: 'user' },
  ];

  const allOverrides = [];
  for (const sec of sections) {
    for (const ov of ovData[sec.key] || []) {
      allOverrides.push({ type: sec.type, label: sec.label, targetId: ov[sec.idKey], commandId: ov.commandId, allowed: ov.allowed });
    }
  }

  if (allOverrides.length === 0) {
    html += '<div style="color:var(--secondary);font-size:13px">No overrides configured.</div>';
  } else {
    html += '<table class="override-table"><thead><tr><th>Type</th><th>Target</th><th>Command</th><th>Access</th><th></th></tr></thead><tbody>';
    for (const ov of allOverrides) {
      const cmdName = _ovCmdNames[ov.commandId] || ov.commandId.slice(0, 8) + '...';
      const tgtName = getTargetName(ov.type, ov.targetId);
      let tgtHtml;
      if (tgtName) {
        tgtHtml = `<div class="ov-target-name">${escape(tgtName)}</div><div class="ov-target-id">${escape(ov.targetId)}</div>`;
      } else {
        tgtHtml = `<span class="ov-target-id">${escape(ov.targetId)}</span>`;
      }
      html += `<tr>
        <td>${ov.label}</td>
        <td>${tgtHtml}</td>
        <td style="font-size:13px">${escape(cmdName)}</td>
        <td style="color:${ov.allowed ? 'var(--green)' : 'var(--red)'}">${ov.allowed ? 'Allow' : 'Deny'}</td>
        <td><button class="del-btn" onclick="deleteOverride('${ov.type}','${ov.targetId}','${ov.commandId}')">✕</button></td>
      </tr>`;
    }
    html += '</tbody></table>';
  }

  el.innerHTML = html;
}

function onOvCmdChange() {
  const badge = document.getElementById('ov-cmd-badge');
  const cmdId = document.getElementById('ov-cmd').value;
  if (!cmdId) { badge.innerHTML = ''; return; }
  const disabled = _ovDisabledSet.has(cmdId);
  badge.innerHTML = `<span class="state-badge ${disabled ? 'disabled' : 'enabled'}">${disabled ? 'Disabled' : 'Enabled'}</span>`;
}

function onOvTypeChange() {
  if (_memberSearchTimeout) {
    clearTimeout(_memberSearchTimeout);
    _memberSearchTimeout = null;
  }
  document.getElementById('ov-target-input').value = '';
  document.getElementById('ov-target').value = '';
  selectedTargetId = '';
  document.getElementById('ov-target-list').style.display = 'none';
}

function onOvTargetInput() {
  const type = document.getElementById('ov-type').value;
  const q = document.getElementById('ov-target-input').value.toLowerCase().trim();
  const list = document.getElementById('ov-target-list');

  // Clear hidden input when user types — forces explicit selection from dropdown
  document.getElementById('ov-target').value = '';
  selectedTargetId = '';

  // Cancel any pending member search
  if (_memberSearchTimeout) {
    clearTimeout(_memberSearchTimeout);
    _memberSearchTimeout = null;
  }

  // User search uses the server-side API
  if (type === 'user') {
    if (q.length < 2) {
      list.style.display = 'none';
      return;
    }
    list.innerHTML = '<div class="ac-item" style="color:var(--secondary);cursor:default">Searching...</div>';
    list.style.display = 'block';
    _memberSearchTimeout = setTimeout(async () => {
      const data = await api(`/api/data/guild-member-search?guildId=${guildId}&q=${encodeURIComponent(q)}`);
      if (!data.ok || !data.members || data.members.length === 0) {
        list.innerHTML = '<div class="ac-item" style="color:var(--secondary);cursor:default">No users found</div>';
        list.style.display = q.length >= 2 ? 'block' : 'none';
        return;
      }
      let html = '';
      for (const m of data.members.slice(0, 50)) {
        const label = m.displayName && m.displayName !== m.username
          ? `${m.username} (${m.displayName})`
          : m.username;
        html += `<div class="ac-item" data-id="${escape(m.id)}" data-label="${escape(label)}">
          ${escape(label)}
          <span class="ac-id">${escape(m.id)}</span>
        </div>`;
      }
      list.innerHTML = html;
      list.style.display = 'block';
    }, 300);
    return;
  }

  // Channels and roles — filter from cached data
  const items = type === 'channel' ? (targetData.channels || []) : (targetData.roles || []);
  if (!q || items.length === 0) { list.style.display = 'none'; return; }

  const filtered = items
    .map(item => {
      const label = item.name;
      const idx = label.toLowerCase().indexOf(q);
      const idIdx = item.id.startsWith(q) ? 0 : -1;
      return { item, label, score: idIdx === 0 ? 0 : (idx >= 0 ? idx : 999) };
    })
    .filter(x => x.score < 999)
    .sort((a, b) => a.score - b.score);

  if (filtered.length === 0) { list.style.display = 'none'; return; }

  let html = '';
  for (const { item, label } of filtered.slice(0, 50)) {
    const color = type === 'role' && item.color && item.color !== '#000000'
      ? `<span style="color:${item.color};font-size:16px">●</span>`
      : '';
    html += `<div class="ac-item" data-id="${escape(item.id)}" data-label="${escape(label)}">
      ${color}${escape(label)}
      <span class="ac-id">${escape(item.id)}</span>
    </div>`;
  }
  list.innerHTML = html;
  list.style.display = 'block';
}

function selectTarget(id, label) {
  document.getElementById('ov-target-input').value = label;
  document.getElementById('ov-target').value = id;
  selectedTargetId = id;
  document.getElementById('ov-target-list').style.display = 'none';
}

async function addOverride() {
  const type = document.getElementById('ov-type').value;
  const targetId = document.getElementById('ov-target').value;
  const commandId = document.getElementById('ov-cmd').value;
  const allowed = document.getElementById('ov-allowed').checked;
  if (!targetId || !commandId) { showMsg('Select a target and command.', 'error'); return; }

  const data = await api('/api/data/guild-overrides', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ guildId, type, targetId, commandId, allowed }),
  });
  if (data.ok) loadOverrides();
  else showMsg('Failed to add override.', 'error');
}

async function deleteOverride(type, targetId, commandId) {
  const data = await api('/api/data/guild-overrides-delete', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ guildId, type, targetId, commandId }),
  });
  if (data.ok) loadOverrides();
}

// ── Tags Tab ──
async function loadTags() {
  const el = document.getElementById('content');
  el.innerHTML = '<div class="loading">Loading tags...</div>';

  const data = await api(`/api/data/guild-tags?guildId=${guildId}`);
  if (!data.ok) { showMsg('Failed to load tags.'); return; }

  let html = '<div class="section-title">Add Tag</div>';
  html += `<div class="add-tag">
    <input id="tag-name" placeholder="Tag name" style="width:150px">
    <textarea id="tag-content" placeholder="Tag content" style="width:300px" rows="1"></textarea>
    <button class="btn" onclick="createTag()">Create</button>
  </div>`;

  html += '<div class="section-title">Tags</div>';

  if (data.tags.length === 0) {
    html += '<div style="color:var(--secondary);font-size:13px">No tags yet.</div>';
  } else {
    for (const tag of data.tags) {
      const date = new Date(tag.createdAt).toLocaleDateString();
      html += `<div class="tag-card" id="tag-${escape(tag.name)}">
        <div class="tag-name">${escape(tag.name)}</div>
        <div class="tag-meta">${tag.uses} uses · Created ${date}</div>
        <div class="tag-content" id="tagc-${escape(tag.name)}">${escape(tag.content)}</div>
        <div class="tag-actions">
          <button class="btn btn-sm btn-ghost" data-tagname="${escape(tag.name)}" onclick="editTag(this.dataset.tagname)">Edit</button>
          <button class="btn btn-sm btn-ghost" data-tagname="${escape(tag.name)}" style="color:var(--red)" onclick="deleteTag(this.dataset.tagname)">Delete</button>
        </div>
      </div>`;
    }
  }

  el.innerHTML = html;
}

async function createTag() {
  const name = document.getElementById('tag-name').value.trim();
  const content = document.getElementById('tag-content').value.trim();
  if (!name || !content) return;
  const data = await api('/api/data/guild-tags-create', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ guildId, name, content }),
  });
  if (data.ok) loadTags();
  else showMsg(data.error || 'Failed to create tag.', 'error');
}

function editTag(name) {
  const contentEl = document.getElementById(`tagc-${name}`);
  const currentText = contentEl.textContent;
  contentEl.innerHTML = `<div class="tag-edit-area"><textarea id="edit-${escape(name)}">${escape(currentText)}</textarea></div>
    <button class="btn btn-sm btn-green" data-tagname="${escape(name)}" onclick="saveTagEdit(this.dataset.tagname)">Save</button>
    <button class="btn btn-sm btn-ghost" onclick="loadTags()">Cancel</button>`;
}

async function saveTagEdit(name) {
  const content = document.getElementById(`edit-${name}`).value.trim();
  if (!content) return;
  const data = await api('/api/data/guild-tag-update', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ guildId, name, content }),
  });
  if (data.ok) loadTags();
}

async function deleteTag(name) {
  if (!confirm(`Delete tag "${name}"?`)) return;
  const data = await api('/api/data/guild-tags-delete', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ guildId, name }),
  });
  if (data.ok) loadTags();
}

// ── Router ──
async function loadTab(tab) {
  setActiveTab(tab);
  try {
    if (tab === 'overview') await loadOverview();
    else if (tab === 'commands') await loadCommands();
    else if (tab === 'overrides') await loadOverrides();
    else if (tab === 'tags') await loadTags();
  } catch (e) {
    console.error(e);
    showMsg('An error occurred.', 'error');
  }
}

loadTab('overview');
</script>
</body>
</html>
